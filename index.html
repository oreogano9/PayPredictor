      function readLocalState() {
        const fallback = { session: null, weeklyStats: { totalHours: 0, totalEarned: 0 }, calendarShifts: DEFAULT_CALENDAR_SHIFTS };

        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));

          return {

            ...saved,
            calendarShifts:

        } catch {

        }
      }

      function writeLocalState(nextState) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(nextState));
        window.dispatchEvent(new Event("earnings-tracker:storage"));
      }

      function readLocalSettings() {
        const fallback = { googleCalendarIcsUrl: "", paysForParking: true };

        try {
          const saved = JSON.parse(localStorage.getItem(SETTINGS_STORAGE_KEY));
          return saved ? { ...fallback, ...saved } : fallback;
        } catch {

        }

      function writeLocalSettings(nextSettings) {
        localStorage.setItem(SETTINGS_STORAGE_KEY, JSON.stringify(nextSettings));
      }

      function unfoldIcsLines(text) {
        return text.replace(/\r?\n[ \t]/g, "");
      }

      function parseIcsDateValue(value) {
        if (!value) return null;
        if (/^\d{8}T\d{6}Z$/.test(value)) {
          const year = Number(value.slice(0, 4));
          const month = Number(value.slice(4, 6)) - 1;
          const day = Number(value.slice(6, 8));
          const hour = Number(value.slice(9, 11));
          const minute = Number(value.slice(11, 13));
          const second = Number(value.slice(13, 15));
          return new Date(Date.UTC(year, month, day, hour, minute, second));
        }
        if (/^\d{8}T\d{6}$/.test(value)) {
          const year = Number(value.slice(0, 4));
          const month = Number(value.slice(4, 6)) - 1;
          const day = Number(value.slice(6, 8));
          const hour = Number(value.slice(9, 11));
          const minute = Number(value.slice(11, 13));
          const second = Number(value.slice(13, 15));
          return new Date(year, month, day, hour, minute, second);
        }
        return null;
      }

      function parsePublicIcsToShifts(icsText) {
        const unfolded = unfoldIcsLines(icsText);
        const events = unfolded.split("BEGIN:VEVENT").slice(1);
        const shifts = [];

        events.forEach((eventText, index) => {
          const dtStartLine = eventText.match(/^DTSTART(?:;[^:\n]+)?:([^\n\r]+)/m);
          const dtEndLine = eventText.match(/^DTEND(?:;[^:\n]+)?:([^\n\r]+)/m);
          const isAllDay = /DTSTART;VALUE=DATE/i.test(eventText) || /DTEND;VALUE=DATE/i.test(eventText);

          if (!dtStartLine || !dtEndLine || isAllDay) {
            return;
          }

          const start = parseIcsDateValue(dtStartLine[1].trim());
          const end = parseIcsDateValue(dtEndLine[1].trim());

          if (!start || !end || end <= start) {
            return;
          }

          shifts.push({
            id: `ical-${formatDateInput(start)}-${formatTimeInput(start)}-${index}`,
            date: formatDateInput(start),
            startTime: formatTimeInput(start),
            endTime: formatTimeInput(end),
            source: "ical",
          });
        });

        return shifts;
      }

      function roundToHalfHour(date) {
        const rounded = new Date(date);
        rounded.setMinutes(Math.round(rounded.getMinutes() / 30) * 30);
        rounded.setSeconds(0);
        rounded.setMilliseconds(0);
        return rounded;
      }

      function formatDateInput(date) {
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(
          date.getDate(),
        ).padStart(2, "0")}`;
      }

      function formatMonthInput(date) {
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
      }

      function formatTimeInput(date) {
        return `${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
      }

      function buildDateTime(dateValue, timeValue) {
        const [year, month, day] = dateValue.split("-").map(Number);
        const [hours, minutes] = timeValue.split(":").map(Number);
        return new Date(year, month - 1, day, hours, minutes, 0, 0);
      }

      function createEmptyBreakdown() {
        return {
          total: 0,
          base: 0,

          nightWeekdayExtra: 0,

          nightSundayHolidayHours: 0,
          mealVoucher: 0,
          elapsed: 0,
          paidElapsed: 0,
          unpaidBreakMs: 0,
        };
      }

      function mergeBreakdowns(left, right) {
        return {
          total: left.total + right.total,
          base: left.base + right.base,
          payCodeTotals: {
            ORD: left.payCodeTotals.ORD + right.payCodeTotals.ORD,
            S15: left.payCodeTotals.S15 + right.payCodeTotals.S15,
            S25: left.payCodeTotals.S25 + right.payCodeTotals.S25,
            S50: left.payCodeTotals.S50 + right.payCodeTotals.S50,
          },
          nightExtra: left.nightExtra + right.nightExtra,
          nightWeekdayExtra: left.nightWeekdayExtra + right.nightWeekdayExtra,
          nightSundayHolidayExtra: left.nightSundayHolidayExtra + right.nightSundayHolidayExtra,
          nightWeekdayHours: left.nightWeekdayHours + right.nightWeekdayHours,
          nightSundayHolidayHours: left.nightSundayHolidayHours + right.nightSundayHolidayHours,
          mealVoucher: left.mealVoucher + right.mealVoucher,
          elapsed: left.elapsed + right.elapsed,
          paidElapsed: left.paidElapsed + right.paidElapsed,
          unpaidBreakMs: left.unpaidBreakMs + right.unpaidBreakMs,
        };
      }

        return `${String(hours).padStart(2, "0")}:${minutes}`;

      const MONTH_OPTIONS = [
        "Gennaio",

      ];

      const YEAR_OPTIONS = Array.from({ length: 5 }, (_, index) => currentYear - 2 + index);
      const roundCurrency = (amount) => Math.round((amount + Number.EPSILON) * 100) / 100;

        `EUR ${amount.toLocaleString("it-IT", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;

      function App() {
        const [user, setUser] = useState(null);
        const [session, setSession] = useState(null);
        const [autoTrackSession, setAutoTrackSession] = useState(null);
        const [dismissedAutoTrackDate, setDismissedAutoTrackDate] = useState("");

        const [selectedStartTime, setSelectedStartTime] = useState(() => formatTimeInput(roundToHalfHour(new Date())));

        const [predictionStartTime, setPredictionStartTime] = useState(() => formatTimeInput(roundToHalfHour(new Date())));

        const [calendarShifts, setCalendarShifts] = useState([]);
        const [importedCalendarShifts, setImportedCalendarShifts] = useState([]);

        const [calendarDate, setCalendarDate] = useState(() => formatDateInput(new Date()));
        const [calendarStartTime, setCalendarStartTime] = useState("08:00");

        const [calendarView, setCalendarView] = useState("plan");

        const [editingCalendarShiftId, setEditingCalendarShiftId] = useState(null);
        const [copyMonthStatus, setCopyMonthStatus] = useState("");
        const [settingsOpen, setSettingsOpen] = useState(false);
        const [googleCalendarIcsUrl, setGoogleCalendarIcsUrl] = useState(() => readLocalSettings().googleCalendarIcsUrl || "");
        const [paysForParking, setPaysForParking] = useState(() => readLocalSettings().paysForParking !== false);
        const [settingsStatus, setSettingsStatus] = useState("");
        const [icalSyncStatus, setIcalSyncStatus] = useState("");
        const [currentTime, setCurrentTime] = useState(new Date());
        const autoEndingRef = useRef(false);
        const [loading, setLoading] = useState(true);
        const [services, setServices] = useState(null);
        const isLocalMode = !firebaseConfig;

        useEffect(() => {
          if (!firebaseConfig) {
            setUser({ uid: "local-user" });
            setLoading(false);
            return;
          }

          const firebaseApp = firebase.initializeApp(firebaseConfig);
          const auth = firebase.auth(firebaseApp);
          const db = firebase.firestore(firebaseApp);
          setServices({ auth, db });

          const initAuth = async () => {
            try {
              if (
                typeof window.__initial_auth_token !== "undefined" &&
                window.__initial_auth_token
              ) {
                await auth.signInWithCustomToken(window.__initial_auth_token);
              } else {
                await auth.signInAnonymously();
              }
            } catch (err) {
              console.error("Errore autenticazione", err);
            }
          };

          initAuth();
          return auth.onAuthStateChanged((nextUser) => {
            setUser(nextUser);
            setLoading(false);
          });
        }, []);

        useEffect(() => {
          if (!user) return undefined;

          if (isLocalMode) {
            const syncLocalState = () => {
              const data = readLocalState();
              setSession(data.session || null);
              setWeeklyStats(data.weeklyStats || { totalHours: 0, totalEarned: 0 });
              setCalendarShifts(data.calendarShifts || []);
            };

            syncLocalState();
            window.addEventListener("earnings-tracker:storage", syncLocalState);
            return () => window.removeEventListener("earnings-tracker:storage", syncLocalState);
          }

          if (!services) return undefined;

          const userDocRef = services.db
            .collection("artifacts")
            .doc(appId)
            .collection("users")
            .doc(user.uid)
            .collection("settings")
            .doc("main");

          return userDocRef.onSnapshot((snap) => {
            if (snap.exists) {
              const data = snap.data();
              setSession(data.session || null);
              setWeeklyStats(data.weeklyStats || { totalHours: 0, totalEarned: 0 });
              setCalendarShifts(data.calendarShifts || []);
            }
          });
        }, [isLocalMode, services, user]);

        useEffect(() => {
          const timer = setInterval(() => setCurrentTime(new Date()), 100);
          return () => clearInterval(timer);
        }, []);

        useEffect(() => {
          if (session) {
            setAutoTrackSession(null);
            return;
          }

          const today = formatDateInput(currentTime);
          if (dismissedAutoTrackDate === today) {
            setAutoTrackSession(null);
            return;
          }

          const todayShifts = allCalendarShifts
            .filter((shift) => shift.date === today)
            .sort((a, b) => a.startTime.localeCompare(b.startTime));

          if (todayShifts.length === 0) {
            setAutoTrackSession(null);
            return;
          }

          const nowMs = currentTime.getTime();
          const ranges = todayShifts.map((shift) => ({
            shift,
            ...getShiftRange(shift.date, shift.startTime, shift.endTime),
          }));
          const ongoing = ranges.find(({ start, end }) => start.getTime() <= nowMs && nowMs < end.getTime());

          if (ongoing) {
            setAutoTrackSession((prev) =>
              prev &&
              prev.prefillDate === today &&
              prev.startTime === ongoing.start.getTime() &&
              prev.autoPrefilled
                ? prev
                : {
                    startTime: ongoing.start.getTime(),
                    autoEndTime: null,
                    prefillDate: today,
                    autoPrefilled: true,
                  },
            );
            return;
          }

          const completed = ranges.filter(({ end }) => end.getTime() <= nowMs);
          if (completed.length === 0) {
            setAutoTrackSession(null);
            return;
          }

          const latestCompleted = completed[completed.length - 1];
          setAutoTrackSession((prev) =>
            prev &&
            prev.prefillDate === today &&
            prev.startTime === latestCompleted.end.getTime() &&
            prev.autoPrefilled
              ? prev
              : {
                  startTime: latestCompleted.end.getTime(),
                  autoEndTime: null,
                  prefillDate: today,
                  autoPrefilled: true,
                },
          );
        }, [allCalendarShifts, currentTime, dismissedAutoTrackDate, session]);

        const activeTrackSession = session || autoTrackSession;

        useEffect(() => {
          let cancelled = false;

          const syncIcal = async () => {
            const nextUrl = googleCalendarIcsUrl.trim();
            if (!nextUrl) {
              setImportedCalendarShifts([]);
              setIcalSyncStatus("");
              return;
            }

            setIcalSyncStatus("Sincronizzazione calendario in corso...");
            try {
              const response = await fetch(nextUrl);
              if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
              }
              const text = await response.text();
              const shifts = parsePublicIcsToShifts(text);
              if (cancelled) return;
              setImportedCalendarShifts(shifts);
              setIcalSyncStatus(`Calendario importato: ${shifts.length} turni letti`);
            } catch (error) {
              console.error("Errore sync iCal", error);
              if (cancelled) return;
              setImportedCalendarShifts([]);
              setIcalSyncStatus("Impossibile leggere l'iCal da browser. Probabile limite CORS.");
            }
          };

          syncIcal();
          return () => {
            cancelled = true;
          };
        }, [googleCalendarIcsUrl]);

        const allCalendarShifts = useMemo(
          () =>
            [...calendarShifts, ...importedCalendarShifts].sort((a, b) =>
              `${a.date} ${a.startTime}`.localeCompare(`${b.date} ${b.startTime}`),
            ),
          [calendarShifts, importedCalendarShifts],
        );

        const calculateStoredDayPrefill = React.useCallback(
          (dateValue, cutoffMs, baseWeeklyHours = 0) => {
            const dayShifts = allCalendarShifts
              .filter((shift) => shift.date === dateValue)
              .sort((a, b) => a.startTime.localeCompare(b.startTime));

            let aggregate = createEmptyBreakdown();
            let paidHoursBefore = 0;

            for (const shift of dayShifts) {
              const { start, end } = getShiftRange(shift.date, shift.startTime, shift.endTime);
              if (end.getTime() > cutoffMs) {
                continue;
              }
              const breakdown = calculateBreakdown(
                start.getTime(),
                end.getTime(),
                baseWeeklyHours + paidHoursBefore,
                baseWeeklyHours + paidHoursBefore,
              );
              aggregate = mergeBreakdowns(aggregate, breakdown);
              paidHoursBefore += breakdown.paidElapsed / 3600000;
            }

            return { aggregate, paidHoursBefore };
          },
          [allCalendarShifts],
        );

        const saveState = async (nextState) => {
          if (!user) return;

          if (isLocalMode) {
            writeLocalState({ session, weeklyStats, calendarShifts, ...nextState });
            return;
          }

          const userDocRef = services.db
            .collection("artifacts")
            .doc(appId)
            .collection("users")
            .doc(user.uid)
            .collection("settings")
            .doc("main");

          await userDocRef.set(nextState, { merge: true });
        };

        const isNightShift = (date) => {
          const hours = date.getHours();
          return hours >= 20 || hours < 8;
        };

        const isSunday = (date) => date.getDay() === 0;

        const getHoliday = (date) => {
          const monthDay = `${String(date.getMonth() + 1).padStart(2, "0")}-${String(
            date.getDate(),
          ).padStart(2, "0")}`;
          return ITALIAN_HOLIDAYS[monthDay] || ITALIAN_HOLIDAYS[`${date.getFullYear()}-${monthDay}`] || null;
        };

        const isSundayOrHoliday = (date) => isSunday(date) || Boolean(getHoliday(date));

        const getPayCode = (payCode) => PAY_CODES[payCode] || PAY_CODES.ORD;

        const getAutomaticPayCode = (
          date,
          cumulativeRegularScopeHours,
          cumulativeWeeklyHours = cumulativeRegularScopeHours,
          regularThreshold = WEEKLY_GOAL_HOURS,
        ) => {
          if (cumulativeWeeklyHours >= FULL_TIME_WEEKLY_HOURS) return "S25";
          if (cumulativeRegularScopeHours >= regularThreshold) {
            return isNightShift(date) && !isSundayOrHoliday(date) ? "S50" : "S15";
          }
          return "ORD";
        };

        const calculateBreakdown = (
          startMs,
          endMs,
          regularScopeHoursBefore = 0,
          weeklyHoursBefore = regularScopeHoursBefore,
          regularThreshold = WEEKLY_GOAL_HOURS,
        ) => {
          let base = 0;
          let nightWeekdayExtra = 0;
          let nightSundayHolidayExtra = 0;
          let nightWeekdayHours = 0;
          let nightSundayHolidayHours = 0;
          const payCodeTotals = {
            ORD: 0,
            S15: 0,
            S25: 0,
            S50: 0,
          };
          const step = 60000;
          const elapsed = endMs - startMs;
          const unpaidBreakMs = elapsed >= UNPAID_BREAK_THRESHOLD ? UNPAID_BREAK_DURATION : 0;
          const payableEndMs = Math.max(startMs, endMs - unpaidBreakMs);
          let curr = startMs;

          while (curr < payableEndMs) {
            const next = Math.min(curr + step, payableEndMs);
            const hours = (next - curr) / 3600000;
            const d = new Date(curr);
            const paidHoursSoFar = (curr - startMs) / 3600000;
            const payCode = getAutomaticPayCode(
              d,
              regularScopeHoursBefore + paidHoursSoFar,
              weeklyHoursBefore + paidHoursSoFar,
              regularThreshold,
            );
            const payCodeDetails = getPayCode(payCode);
            payCodeTotals[payCode] += hours;
            base += hours * BASE_RATE * payCodeDetails.multiplier;
            if (isNightShift(d) && isSundayOrHoliday(d)) {
              nightSundayHolidayExtra += hours * (BASE_RATE * NIGHT_SUNDAY_HOLIDAY_BONUS_FRACTION);
              nightSundayHolidayHours += hours;
            } else if (isNightShift(d) && payCode !== "S50") {
              nightWeekdayExtra += hours * (BASE_RATE * NIGHT_WEEKDAY_BONUS_FRACTION);
              nightWeekdayHours += hours;
            }
            curr = next;
          }

          const mealVoucher = elapsed >= MEAL_VOUCHER_THRESHOLD ? MEAL_VOUCHER_AMOUNT : 0;
          const paidElapsed = Math.max(0, elapsed - unpaidBreakMs);
          const nightExtra = nightWeekdayExtra + nightSundayHolidayExtra;
          const total = base + nightExtra;
          return {
            total,
            base,
            payCodeTotals,
            nightExtra,
            nightWeekdayExtra,
            nightSundayHolidayExtra,
            nightWeekdayHours,
            nightSundayHolidayHours,
            mealVoucher,
            elapsed,
            paidElapsed,
            unpaidBreakMs,
          };
        };

        const calculatePayslipNetEstimate = ({
          payCodeTotals,
          nightWeekdayHours,
          nightSundayHolidayHours,
          workedDays,
          parkingDeduction,
        }) => {
          if (workedDays === 0) {
            return {
              net: 0,
              netPlusVouchers: 0,
              grossPayroll: 0,
              totalCredits: 0,
              totalDeductions: 0,
              irpefTaxable: 0,
              substituteTaxable: 0,
            };
          }

          const regularPay = roundCurrency(payCodeTotals.ORD * PAYSLIP_REGULAR_HOURLY_RATE);
          const s15Pay = roundCurrency(payCodeTotals.S15 * PAYSLIP_S15_RATE);
          const s50Pay = roundCurrency(payCodeTotals.S50 * PAYSLIP_S50_RATE);
          const s25Pay = roundCurrency(payCodeTotals.S25 * PAYSLIP_S25_RATE);
          const nttPay = roundCurrency(nightWeekdayHours * PAYSLIP_NTT_RATE);
          const ntdPay = roundCurrency(nightSundayHolidayHours * PAYSLIP_NTD_RATE);
          const shiftAllowance = roundCurrency(workedDays * PAYSLIP_SHIFT_ALLOWANCE_RATE);
          const dailyTurnistaAllowance = roundCurrency(workedDays * PAYSLIP_DAILY_TURNISTA_RATE);
          const campoAllowance = roundCurrency(workedDays * PAYSLIP_CAMPO_RATE);
          const variablePay = roundCurrency(
            shiftAllowance + dailyTurnistaAllowance + campoAllowance + s15Pay + s50Pay + s25Pay + nttPay + ntdPay,
          );
          const grossPayroll = roundCurrency(regularPay + variablePay);
          const contributionBase = Math.floor(grossPayroll);
          const fondoTrasporto = roundCurrency(contributionBase * PAYSLIP_FONDO_TRASPORTO_RATE);
          const ivs = roundCurrency(contributionBase * PAYSLIP_IVS_RATE);
          const fis = roundCurrency(contributionBase * PAYSLIP_FIS_RATE);
          const cigs = roundCurrency(contributionBase * PAYSLIP_CIGS_RATE);
          const substituteTaxable = roundCurrency(variablePay * PAYSLIP_SUBSTITUTE_TAXABLE_VARIABLE_FRACTION);
          const substituteTax = roundCurrency(substituteTaxable * PAYSLIP_SUBSTITUTE_TAX_RATE);
          const irpefTaxable = roundCurrency(grossPayroll - fondoTrasporto - ivs - fis - cigs - substituteTaxable);
          const irpefGross = roundCurrency(irpefTaxable * PAYSLIP_IRPEF_RATE);
          const irpefWithheld = Math.max(0, roundCurrency(irpefGross - PAYSLIP_EMPLOYEE_DEDUCTION));
          const totalCredits = roundCurrency(PAYSLIP_TRATTAMENTO_INTEGRATIVO + PAYSLIP_L207_INDEMNITY);
          const totalDeductions = roundCurrency(
            parkingDeduction + fondoTrasporto + ivs + fis + cigs + substituteTax + irpefWithheld,
          );
          const net = roundCurrency(grossPayroll + totalCredits - totalDeductions + PAYSLIP_ROUNDING);

          return {
            net,
            grossPayroll,
            regularPay,
            variablePay,
            totalCredits,
            totalDeductions,
            irpefTaxable,
            substituteTaxable,
            irpefWithheld,
            substituteTax,
            socialContributions: roundCurrency(fondoTrasporto + ivs + fis + cigs),
          };
        };

        const getSessionAutoEnd = (startMs, timeValue) => {
          if (!timeValue) return null;
          const startDate = new Date(startMs);
          const dateValue = formatDateInput(startDate);
          const { end } = getShiftRange(dateValue, formatTimeInput(startDate), timeValue);
          return end.getTime();
        };

        const startSession = async () => {
          if (!user) return;
          const today = formatDateInput(new Date());
          const latched = buildDateTime(today, selectedStartTime);

          await saveState({
            session: { startTime: latched.getTime(), active: true, autoEndTime: null },
            weeklyStats,
          });
        };

        const endSession = async (forcedEndMs = null) => {
          if (!user || !activeTrackSession) return;
          const endMs = forcedEndMs ?? currentTime.getTime();
          const prefill = activeTrackSession.prefillDate
            ? calculateStoredDayPrefill(activeTrackSession.prefillDate, activeTrackSession.startTime, weeklyStats.totalHours)
            : { aggregate: createEmptyBreakdown(), paidHoursBefore: 0 };
          const breakdown = calculateBreakdown(
            activeTrackSession.startTime,
            endMs,
            weeklyStats.totalHours + prefill.paidHoursBefore,
            weeklyStats.totalHours + prefill.paidHoursBefore,
          );
          const updatedStats = {
            totalHours: weeklyStats.totalHours + breakdown.paidElapsed / 3600000,
            totalEarned: weeklyStats.totalEarned + breakdown.total,
          };

          setAutoTrackSession(null);
          if (activeTrackSession.autoPrefilled) {
            setDismissedAutoTrackDate(formatDateInput(currentTime));
          }
          await saveState({
            session: null,
            weeklyStats: updatedStats,
          });
        };

        const cancelSession = async () => {
          if (!user || !activeTrackSession) return;
          if (session) {
            await saveState({
              session: null,
              weeklyStats,
            });
          }
          setAutoTrackSession(null);
          if (activeTrackSession.autoPrefilled) {
            setDismissedAutoTrackDate(formatDateInput(currentTime));
          }
        };

        const adjustStart = async (mins) => {
          if (!user || !activeTrackSession) return;
          const newStart = activeTrackSession.startTime + mins * 60000;
          if (session) {
            await saveState({
              session: {
                ...session,
                startTime: newStart,
                autoEndTime: session.autoEndTime
                  ? getSessionAutoEnd(newStart, formatTimeInput(new Date(session.autoEndTime)))
                  : null,
              },
            });
            return;
          }
          setAutoTrackSession({
            ...activeTrackSession,
            startTime: newStart,
            autoEndTime: activeTrackSession.autoEndTime
              ? getSessionAutoEnd(newStart, formatTimeInput(new Date(activeTrackSession.autoEndTime)))
              : null,
          });
        };

        const updateSessionAutoEnd = async (timeValue) => {
          if (!user || !activeTrackSession) return;
          if (session) {
            await saveState({
              session: {
                ...session,
                autoEndTime: getSessionAutoEnd(session.startTime, timeValue),
              },
            });
            return;
          }
          setAutoTrackSession({
            ...activeTrackSession,
            autoEndTime: getSessionAutoEnd(activeTrackSession.startTime, timeValue),
          });
        };

        const getShiftRange = (dateValue, startValue, endValue) => {
          const start = buildDateTime(dateValue, startValue);
          let end = buildDateTime(dateValue, endValue);
          if (end <= start) end = new Date(end.getTime() + 24 * 3600000);
          return { start, end };
        };

        const getWeekKey = (dateValue) => {
          const date = buildDateTime(dateValue, "00:00");
          const monday = new Date(date);
          const dayOffset = (monday.getDay() + 6) % 7;
          monday.setDate(monday.getDate() - dayOffset);
          return formatDateInput(monday);
        };

        const saveCalendarShift = async () => {
          if (!user) return;
          const nextShift = {
            id: editingCalendarShiftId || `${Date.now()}`,
            date: calendarDate,
            startTime: calendarStartTime,
            endTime: calendarEndTime,
          };
          const nextShifts = editingCalendarShiftId
            ? calendarShifts.map((shift) => (shift.id === editingCalendarShiftId ? nextShift : shift))
            : [...calendarShifts, nextShift];

          setCalendarShifts(nextShifts);
          setEditingCalendarShiftId(null);
          await saveState({ calendarShifts: nextShifts });
        };

        const editCalendarShift = (shift) => {
          setEditingCalendarShiftId(shift.id);
          setCalendarDate(shift.date);
          setCalendarMonth(shift.date.slice(0, 7));
          setCalendarStartTime(shift.startTime);
          setCalendarEndTime(shift.endTime);

        const deleteCalendarShift = async (shiftId) => {

          setCalendarShifts(nextShifts);

          await saveState({ calendarShifts: nextShifts });

        const saveSettings = () => {
          writeLocalSettings({

          setSettingsStatus("Impostazioni salvate in questo browser");

        const clearGoogleCalendarIcsUrl = () => {

          writeLocalSettings({
            googleCalendarIcsUrl: "",
            paysForParking,
          });
          setSettingsStatus("URL iCal rimosso da questo browser");
        };

        const loadSeededMonth = async (monthKey) => {
          const seed = SEEDED_MONTHS[monthKey];
          if (!seed) return;

          const nextShifts = [
            ...calendarShifts.filter((shift) => !shift.date.startsWith(monthKey)),
            ...seed.shifts,
          ].sort((a, b) => `${a.date} ${a.startTime}`.localeCompare(`${b.date} ${b.startTime}`));

          setCalendarMonth(monthKey);
          setCalendarDate(`${monthKey}-01`);
          setCalendarShifts(nextShifts);
          setEditingCalendarShiftId(null);
          await saveState({ calendarShifts: nextShifts });
        };

        const updateCalendarMonth = (nextYear, nextMonth) => {
          const nextValue = `${nextYear}-${String(nextMonth).padStart(2, "0")}`;
          setCalendarMonth(nextValue);
          if (!calendarDate.startsWith(nextValue)) {
            setCalendarDate(`${nextValue}-01`);
          }
        };

        const selectCalendarDay = (dateValue) => {

            .filter((shift) => shift.date === dateValue)
            .sort((a, b) => a.startTime.localeCompare(b.startTime));
          const editableShift = dayShifts.find((shift) => shift.source !== "ical");

          setCalendarDate(dateValue);
          setCalendarMonth(dateValue.slice(0, 7));
          if (editableShift) {
            editCalendarShift(editableShift);
          } else {
            setEditingCalendarShiftId(null);
          }
        };

        useEffect(() => {
          const dayShifts = allCalendarShifts
            .filter((shift) => shift.date === calendarDate)
            .sort((a, b) => a.startTime.localeCompare(b.startTime));

          if (dayShifts.length === 0) {
            if (editingCalendarShiftId !== null) setEditingCalendarShiftId(null);
            setCalendarStartTime("08:00");
            setCalendarEndTime("14:00");
            return;
          }

          const activeShift = dayShifts.find((shift) => shift.id === editingCalendarShiftId) || dayShifts[0];
          const nextEditingId = activeShift.source === "ical" ? null : activeShift.id;
          if (editingCalendarShiftId !== nextEditingId) setEditingCalendarShiftId(nextEditingId);
          if (calendarStartTime !== activeShift.startTime) setCalendarStartTime(activeShift.startTime);
          if (calendarEndTime !== activeShift.endTime) setCalendarEndTime(activeShift.endTime);
        }, [allCalendarShifts, calendarDate]);

        const buildMonthlyMarkdown = () => {
          const monthLabel = `${MONTH_OPTIONS[Number(calendarMonth.slice(5, 7)) - 1]} ${calendarMonth.slice(0, 4)}`;
          const summaryRows = [
            ["Net + vouchers", formatEuro(monthlyPrediction.total)],
            ["Payslip net estimate", formatEuro(monthlyPrediction.payslipNetEstimate.net)],
            ["Paid hours", `${(monthlyPrediction.paidElapsed / 3600000).toFixed(1)} h`],
            ["Shift earnings", formatEuro(monthlyPrediction.earningsTotal)],
            ["Parking", `-${formatEuro(monthlyPrediction.parkingDeduction).replace("EUR ", "EUR ")}`],
            ["After parking", formatEuro(monthlyPrediction.incomeAfterParking)],
            ["Payroll gross", formatEuro(monthlyPrediction.payslipNetEstimate.grossPayroll)],
            ["Food vouchers", formatEuro(monthlyPrediction.foodVouchers)],
            ...Object.entries(monthlyPrediction.payCodeTotals)
              .filter(([, hours]) => hours > 0)
              .map(([code, hours]) => [getPayCode(code).label, `${hours.toFixed(2)} h`]),
            ...(monthlyPrediction.nightWeekdayExtra > 0
              ? [["NTT", `+${formatEuro(monthlyPrediction.nightWeekdayExtra)}`]]
              : []),
            ...(monthlyPrediction.nightSundayHolidayExtra > 0
              ? [["NTD", `+${formatEuro(monthlyPrediction.nightSundayHolidayExtra)}`]]
              : []),
            ...(monthlyPrediction.unpaidBreakMs > 0
              ? [["Pausa pranzo", `-${monthlyPrediction.unpaidBreakMs / 60000} min`]]
              : []),
            ["Payroll deductions", `-${formatEuro(monthlyPrediction.payslipNetEstimate.totalDeductions)}`],
            ["Payroll credits", `+${formatEuro(monthlyPrediction.payslipNetEstimate.totalCredits)}`],
          ];

          const shiftsTable = monthlyShiftBreakdowns.length
            ? [
                "| Data | Orario | Nota | Importo |",
                "| --- | --- | --- | ---: |",
                ...monthlyShiftBreakdowns.map(({ shift, totalWithVoucher }) => {
                  return `| ${new Date(`${shift.date}T00:00:00`).toLocaleDateString("it-IT")} | ${shift.startTime}-${shift.endTime} | ${shift.note || "—"} | ${formatEuro(totalWithVoucher)} |`;
                }),
              ].join("\n")
            : "_Nessun turno salvato per questo mese._";

          return [
            `## ${monthLabel}`,
            "",
            "| Voce | Valore |",
            "| --- | ---: |",
            ...summaryRows.map(([label, value]) => `| ${label} | ${value} |`),
            "",
            "### Turni",
            "",
            shiftsTable,
          ].join("\n");
        };

        const copyMonthToClipboard = async () => {
          try {
            await navigator.clipboard.writeText(buildMonthlyMarkdown());
            setCopyMonthStatus("Mese copiato");
            setTimeout(() => setCopyMonthStatus(""), 2500);
          } catch (error) {
            console.error("Errore copia appunti", error);
            setCopyMonthStatus("Copia non riuscita");
            setTimeout(() => setCopyMonthStatus(""), 2500);
          }
        };

        const currentBreakdown = useMemo(() => {
          if (!activeTrackSession) return null;

          const prefillDate = activeTrackSession.prefillDate;
          const prefill = prefillDate
            ? calculateStoredDayPrefill(prefillDate, activeTrackSession.startTime, weeklyStats.totalHours)
            : { aggregate: createEmptyBreakdown(), paidHoursBefore: 0 };
          const liveBreakdown = calculateBreakdown(
            activeTrackSession.startTime,
            Math.max(currentTime.getTime(), activeTrackSession.startTime),
            weeklyStats.totalHours + prefill.paidHoursBefore,
            weeklyStats.totalHours + prefill.paidHoursBefore,
          );

          return mergeBreakdowns(prefill.aggregate, liveBreakdown);
        }, [activeTrackSession, calculateStoredDayPrefill, currentTime, weeklyStats.totalHours]);
        const activeAutoEndLabel = useMemo(() => {
          if (!activeTrackSession?.autoEndTime) return "";
          return new Date(activeTrackSession.autoEndTime).toLocaleTimeString("it-IT", {
            hour: "2-digit",
            minute: "2-digit",
          });
        }, [activeTrackSession]);
        const predictionBreakdown = useMemo(() => {
          const { start, end } = getShiftRange(predictionDate, predictionStartTime, predictionEndTime);
          return calculateBreakdown(start.getTime(), end.getTime(), weeklyStats.totalHours);
        }, [predictionDate, predictionEndTime, predictionStartTime, weeklyStats.totalHours]);
        const monthlyShifts = useMemo(
          () =>
            [...allCalendarShifts]
              .filter((shift) => shift.date.startsWith(calendarMonth))
              .sort((a, b) => `${a.date} ${a.startTime}`.localeCompare(`${b.date} ${b.startTime}`)),
          [allCalendarShifts, calendarMonth],
        );
        const calendarDays = useMemo(() => {
          const [year, month] = calendarMonth.split("-").map(Number);
          const firstDay = new Date(year, month - 1, 1);
          const startOffset = (firstDay.getDay() + 6) % 7;
          const gridStart = new Date(firstDay);
          gridStart.setDate(firstDay.getDate() - startOffset);

          return Array.from({ length: 42 }, (_, index) => {
            const date = new Date(gridStart);
            date.setDate(gridStart.getDate() + index);
            const dateValue = formatDateInput(date);
            const shifts = allCalendarShifts
              .filter((shift) => shift.date === dateValue)
              .sort((a, b) => a.startTime.localeCompare(b.startTime));
            const summary = shifts.reduce(
              (acc, shift) => {
                const { start, end } = getShiftRange(shift.date, shift.startTime, shift.endTime);
                const breakdown = calculateBreakdown(start.getTime(), end.getTime(), 0);
                acc.total += breakdown.total + breakdown.mealVoucher;
                acc.displayHours += breakdown.elapsed / 3600000;
                acc.hasNightShift =
                  acc.hasNightShift ||
                  breakdown.nightWeekdayHours > 0 ||
                  breakdown.nightSundayHolidayHours > 0 ||
                  breakdown.payCodeTotals.S50 > 0;
                return acc;
              },
              { total: 0, displayHours: 0, hasNightShift: false },
            );

            return {
              date,
              dateValue,
              inMonth: dateValue.startsWith(calendarMonth),
              shifts,
              total: summary.total,
              displayHours: summary.displayHours,
              hasNightShift: summary.hasNightShift,
            };
          });
        }, [allCalendarShifts, calendarMonth]);
        const monthlyPrediction = useMemo(() => {
          const weeklyHoursByKey = {};
          const payCodeTotals = { ORD: 0, S15: 0, S25: 0, S50: 0 };
          let total = 0;
          let monthlyPaidHoursBefore = 0;
          let paidElapsed = 0;
          let elapsed = 0;
          let nightWeekdayExtra = 0;
          let nightSundayHolidayExtra = 0;
          let nightWeekdayHours = 0;
          let nightSundayHolidayHours = 0;
          let unpaidBreakMs = 0;
          let foodVouchers = 0;
          const workedDays = new Set(monthlyShifts.map((shift) => shift.date)).size;

          for (const shift of monthlyShifts) {
            const weekKey = getWeekKey(shift.date);
            const { start, end } = getShiftRange(shift.date, shift.startTime, shift.endTime);
            const breakdown = calculateBreakdown(
              start.getTime(),
              end.getTime(),
              monthlyPaidHoursBefore,
              weeklyHoursByKey[weekKey] || 0,
              MONTHLY_ORDINARY_HOURS,
            );
            monthlyPaidHoursBefore += breakdown.paidElapsed / 3600000;
            weeklyHoursByKey[weekKey] = (weeklyHoursByKey[weekKey] || 0) + breakdown.paidElapsed / 3600000;
            total += breakdown.total;
            paidElapsed += breakdown.paidElapsed;
            elapsed += breakdown.elapsed;
            nightWeekdayExtra += breakdown.nightWeekdayExtra;
            nightSundayHolidayExtra += breakdown.nightSundayHolidayExtra;
            nightWeekdayHours += breakdown.nightWeekdayHours;
            nightSundayHolidayHours += breakdown.nightSundayHolidayHours;
            unpaidBreakMs += breakdown.unpaidBreakMs;
            foodVouchers += breakdown.mealVoucher;
            for (const [code, hours] of Object.entries(breakdown.payCodeTotals)) {
              payCodeTotals[code] += hours;
            }
          }

          const earningsTotal = total;
          const parkingDeduction = monthlyShifts.length > 0 && paysForParking ? MONTHLY_PARKING_DEDUCTION : 0;
          const incomeAfterParking = Math.max(0, earningsTotal - parkingDeduction);
          const payslipNetEstimate = calculatePayslipNetEstimate({
            payCodeTotals,
            nightWeekdayHours,
            nightSundayHolidayHours,
            workedDays,
            parkingDeduction,
          });
          const totalWithVouchers = payslipNetEstimate.net + foodVouchers;
          return {
            total: totalWithVouchers,
            incomeAfterParking,
            earningsTotal,
            parkingDeduction,
            foodVouchers,
            payslipNetEstimate,
            paidElapsed,
            elapsed,
            nightWeekdayExtra,
            nightSundayHolidayExtra,
            nightWeekdayHours,
            nightSundayHolidayHours,
            unpaidBreakMs,
            payCodeTotals,
          };
        }, [monthlyShifts, paysForParking]);
        const monthlyShiftBreakdowns = useMemo(() => {
          const weeklyHoursByKey = {};
          let monthlyPaidHoursBefore = 0;

          return monthlyShifts.map((shift) => {
            const weekKey = getWeekKey(shift.date);
            const { start, end } = getShiftRange(shift.date, shift.startTime, shift.endTime);
            const breakdown = calculateBreakdown(
              start.getTime(),
              end.getTime(),
              monthlyPaidHoursBefore,
              weeklyHoursByKey[weekKey] || 0,
              MONTHLY_ORDINARY_HOURS,
            );

            monthlyPaidHoursBefore += breakdown.paidElapsed / 3600000;
            weeklyHoursByKey[weekKey] = (weeklyHoursByKey[weekKey] || 0) + breakdown.paidElapsed / 3600000;

            return {
              shift,
              breakdown,
              totalWithVoucher: breakdown.total + breakdown.mealVoucher,
            };
          });
        }, [monthlyShifts]);
        const monthlyGraphData = useMemo(() => {
          const breakdownsByDate = monthlyShiftBreakdowns.reduce((acc, entry) => {
            if (!acc[entry.shift.date]) {
              acc[entry.shift.date] = [];
            }
            acc[entry.shift.date].push(entry);
            return acc;
          }, {});
          let runningPay = 0;
          const points = calendarDays
            .filter((day) => day.inMonth && day.shifts.length > 0)
            .map((day) => {
              const dayBreakdowns = breakdownsByDate[day.dateValue] || [];
              const windowStart = day.shifts[0]?.startTime || null;
              const windowEnd = day.shifts[day.shifts.length - 1]?.endTime || null;
              const nightHours = dayBreakdowns.reduce(
                (sum, entry) => sum + entry.breakdown.nightWeekdayHours + entry.breakdown.nightSundayHolidayHours,
                0,
              );
              const mealVoucher = dayBreakdowns.reduce((sum, entry) => sum + entry.breakdown.mealVoucher, 0);

                    acc[code] = (acc[code] || 0) + hours;
                  }
                  return acc;
                },
                {},
              );
              runningPay += day.total;
              return {
                key: day.dateValue,
                dayNumber: day.date.getDate(),
                hours: day.displayHours,
                pay: day.total,
                cumulativePay: runningPay,
                hasNightShift: day.hasNightShift,
                windowStart,
                windowEnd,
                nightHours,
                mealVoucher,
                unpaidBreakMinutes,
                payCodeTotals,

          return { points, maxHours, maxPay, maxCumulativePay };

          return Math.max(0, Math.min(1, (dayTotal - minCalendarDayTotal) / range));

                        <div className="bg-emerald-500/10 border border-emerald-500/30 text-emerald-200 text-[9px] font-black px-3 py-1 rounded uppercase tracking-tight">
                          Buono pasto: EUR {currentBreakdown.mealVoucher.toFixed(2)}
                        </div>
                      )}
                      {currentBreakdown.unpaidBreakMs > 0 && (
                        <div className="bg-red-500/10 border border-red-500/30 text-red-200 text-[9px] font-black px-3 py-1 rounded uppercase tracking-tight">
                          Pausa pranzo: -30 min
                        </div>
                      )}
                    </div>
                  </div>

                  <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4 w-full mb-10">
                    <div className="bg-zinc-900/70 border border-white/10 p-5 rounded text-center">
                      <p className="text-[10px] font-bold text-zinc-500 uppercase mb-4 tracking-widest">
                        Ora inizio
                      </p>
                      <div className="flex items-center justify-between px-2">
                        <button
                          onClick={() => adjustStart(-30)}
                          className="text-zinc-500 hover:text-white"
                          aria-label="Sposta indietro l'ora di inizio di 30 minuti"
                        >
                          <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24">
                            <path d="m15 18-6-6 6-6" />
                          </svg>
                        </button>
                        <span className="text-2xl font-bold tabular-nums">
                          {new Date(activeTrackSession.startTime).toLocaleTimeString("it-IT", {
                            hour: "2-digit",
                            minute: "2-digit",
                          })}
                        </span>
                        <button
                          onClick={() => adjustStart(30)}
                          className="text-zinc-500 hover:text-white"
                          aria-label="Sposta avanti l'ora di inizio di 30 minuti"
                        >
                          <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24">
                            <path d="m9 18 6-6-6-6" />
                          </svg>
                        </button>
                      </div>
                    </div>
                    <div className="bg-zinc-900/70 border border-white/10 p-5 rounded text-center">
                      <p className="text-[10px] font-bold text-zinc-500 uppercase mb-4 tracking-widest">
                        Trascorso
                      </p>
                      <span className="text-2xl font-bold tabular-nums">
                        {Math.floor(currentBreakdown.elapsed / 3600000).toString().padStart(2, "0")}:
                        {Math.floor((currentBreakdown.elapsed % 3600000) / 60000)
                          .toString()
                          .padStart(2, "0")}
                        :
                        {Math.floor((currentBreakdown.elapsed % 60000) / 1000)
                          .toString()
                          .padStart(2, "0")}
                      </span>
                    </div>
                    <div className="bg-zinc-900/70 border border-white/10 p-5 rounded text-center">
                      <p className="text-[10px] font-bold text-zinc-500 uppercase mb-4 tracking-widest">
                        Tariffa stimata
                      </p>
                      <span
                        className={`text-2xl font-bold ${
                          isNightShift(currentTime) ? "text-yellow-400" : "text-white"
                        }`}
                      >
                        EUR {liveRate.toFixed(2)}
                      </span>
                      <p className="text-[10px] font-bold uppercase tracking-widest text-zinc-500 mt-3">
                        {isNightShift(currentTime)
                          ? "Calcolo busta con maggiorazione notte"
                          : "Calcolo busta oraria stimata"}
                      </p>
                    </div>
                    <div className="bg-zinc-900/70 border border-white/10 p-5 rounded text-center">
                      <p className="text-[10px] font-bold text-zinc-500 uppercase mb-4 tracking-widest">
                        Fine automatica
                      </p>
                      <select
                        value={activeTrackSession?.autoEndTime ? formatTimeInput(new Date(activeTrackSession.autoEndTime)) : ""}
                        onChange={(event) => updateSessionAutoEnd(event.target.value)}
                        className="w-full bg-black/40 border border-white/10 rounded px-3 py-3 text-sm font-bold text-white"
                      >
                        <option value="" className="bg-zinc-950">
                          Disattivata
                        </option>
                        {TIME_OPTIONS.map((time) => (
                          <option key={time} value={time} className="bg-zinc-950">
                            {time}
                          </option>
                        ))}
                      </select>
                      <p className="text-[10px] font-bold uppercase tracking-widest text-zinc-500 mt-3">
                        {activeAutoEndLabel ? `Salva alle ${activeAutoEndLabel}` : "Nessuna ora impostata"}
                      </p>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full max-w-2xl">
                    <button
                      onClick={endSession}
                      className="w-full bg-white text-black py-4 rounded text-sm font-extrabold hover:bg-yellow-400 transition-all active:scale-[0.99] uppercase tracking-widest"
                    >
                      Salva turno
                    </button>
                    <button
                      onClick={cancelSession}
                      className="w-full border border-red-500/30 text-red-300 py-4 rounded text-sm font-extrabold hover:text-red-100 hover:border-red-400/50 transition-all active:scale-[0.99] uppercase tracking-widest"
                    >
                      Annulla turno
                    </button>
                  </div>
                </section>
              )}
            </main>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
