                            {monthlyShiftBreakdowns.length === 0 ? (
                              <p className="text-sm text-zinc-500 text-center py-4">Nessun turno salvato per questo mese.</p>
                            ) : (
                              monthlyShiftBreakdowns.map(({ shift, totalWithVoucher }) => {
                                return (
                                  <div
                                    key={shift.id}
                                    className="flex items-center justify-between gap-3 bg-black/30 border border-white/10 rounded p-3"
                                  >
                                    <div>
                                      <div className="text-sm font-black text-white">
                                        {shift.date} - {shift.startTime}-{shift.endTime}
                                      </div>
                                      {shift.note && (
                                        <div className="text-[10px] font-bold uppercase tracking-widest text-zinc-400">
                                          {shift.note}
                                        </div>
                                      )}
                                      <div className="text-[10px] font-bold uppercase tracking-widest text-zinc-500">
                                        {isSickShift(shift)
                                          ? "Conteggio malattia"
                                          : shift.source === "local-extracted"
                                            ? "Importato da PDF o testo"
                                            : "Importato da iCal"}
                                      </div>
                                      <div className="text-[10px] font-bold uppercase tracking-widest text-zinc-500">
                                        EUR {totalWithVoucher.toFixed(2)} stima
                                      </div>
                                    </div>
                                    <div className="rounded border border-white/10 px-3 py-2 text-[10px] font-black uppercase tracking-widest text-zinc-500">
                                      Sola lettura
                                    </div>
                                  </div>
                                );
                              })
                            )}
                          </div>
                          <div className="space-y-2">
                            <button
                              onClick={copyMonthToClipboard}
                              className="w-full rounded border border-white/10 px-3 py-3 text-[10px] font-black uppercase tracking-widest text-zinc-300 hover:text-white"
                            >
                              Copia mese in Markdown
                            </button>
                            {copyMonthStatus && (
                              <p className="text-center text-[10px] font-bold uppercase tracking-widest text-emerald-300">
                                {copyMonthStatus}
                              </p>
                            )}
                          </div>
                            </>
                          ) : (
                            <div className="bg-black/30 border border-white/10 rounded p-4">
                              <div className="flex flex-wrap items-start justify-between gap-3 mb-4">
                                <div>
                                  <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-2">
                                    Ore e paga giornaliere
                                  </p>
                                  <p className="text-sm font-bold text-zinc-300">
                                    Giorni liberi esclusi. Barre = ore lavorate, linea = paga stimata del giorno.
                                  </p>
                                </div>
                                <div className="flex flex-wrap gap-2 text-[9px] font-black uppercase tracking-widest">
                                  {[
                                    { key: "both", label: "Entrambe" },
                                    { key: "hours", label: "Solo ore" },
                                    { key: "pay", label: "Solo paga" },
                                  ].map((option) => (
                                    <button
                                      key={option.key}
                                      onClick={() => setCalendarGraphMode(option.key)}
                                      className={`rounded border px-2 py-1 transition ${
                                        calendarGraphMode === option.key
                                          ? "border-orange-400 bg-orange-400/10 text-orange-200"
                                          : "border-white/10 bg-white/[0.04] text-zinc-300 hover:text-white"
                                      }`}
                                    >
                                      {option.label}
                                    </button>
                                  ))}
                                </div>
                                <div className="flex flex-wrap gap-2 text-[9px] font-black uppercase tracking-widest">
                                  {[
                                    { key: "daily", label: "Paga giornaliera" },
                                    { key: "cumulative", label: "Paga cumulata" },
                                  ].map((option) => (
                                    <button
                                      key={option.key}
                                      onClick={() => setCalendarPayLineMode(option.key)}
                                      className={`rounded border px-2 py-1 transition ${
                                        calendarPayLineMode === option.key
                                          ? "border-orange-400 bg-orange-400/10 text-orange-200"
                                          : "border-white/10 bg-white/[0.04] text-zinc-300 hover:text-white"
                                      }`}
                                    >
                                      {option.label}
                                    </button>
                                  ))}
                                </div>
                              </div>
                              {monthlyGraphData.points.length === 0 ? (
                                <p className="py-8 text-center text-sm text-zinc-500">
                                  Nessun turno salvato per questo mese.
                                </p>
                              ) : (
                                <div className="space-y-4">
                                  <div className="overflow-x-auto">
                                    <svg
                                      viewBox={`0 0 ${Math.max(720, monthlyGraphData.points.length * 44)} 280`}
                                      className="w-full min-w-[720px]"
                                      role="img"
                                      aria-label="Grafico ore e paga del mese"
                                    >
                                      {(() => {
                                        const width = Math.max(720, monthlyGraphData.points.length * 44);
                                        const height = 280;
                                        const left = 40;
                                        const right = 28;
                                        const top = 16;
                                        const bottom = 42;
                                        const plotWidth = width - left - right;
                                        const plotHeight = height - top - bottom;
                                        const step = monthlyGraphData.points.length > 1 ? plotWidth / (monthlyGraphData.points.length - 1) : 0;
                                        const maxHours = Math.max(8, monthlyGraphData.maxHours);
                                        const paySeriesMax =
                                          calendarPayLineMode === "cumulative"
                                            ? Math.max(60, monthlyGraphData.maxCumulativePay)
                                            : Math.max(60, monthlyGraphData.maxPay);
                                        const showHours = calendarGraphMode === "both" || calendarGraphMode === "hours";
                                        const showPay = calendarGraphMode === "both" || calendarGraphMode === "pay";
                                        const payPath = showPay
                                          ? monthlyGraphData.points
                                          .map((point, index) => {
                                            const x = left + step * index;
                                            const payValue = calendarPayLineMode === "cumulative" ? point.cumulativePay : point.pay;
                                            const y = top + plotHeight - (payValue / paySeriesMax) * plotHeight;
                                            return `${index === 0 ? "M" : "L"} ${x} ${y}`;
                                          })
                                          .join(" ")
                                          : "";

                                        return (
                                          <>
                                            {[0, 0.25, 0.5, 0.75, 1].map((tick) => {
                                              const y = top + plotHeight - plotHeight * tick;
                                              return (
                                                <g key={tick}>
                                                  <line
                                                    x1={left}
                                                    y1={y}
                                                    x2={width - right}
                                                    y2={y}
                                                    stroke="rgba(255,255,255,0.08)"
                                                    strokeWidth="1"
                                                  />
                                                  <text
                                                    x={left - 8}
                                                    y={y + 4}
                                                    textAnchor="end"
                                                    fill="rgba(161,161,170,0.9)"
                                                    fontSize="10"
                                                    fontWeight="700"
                                                  >
                                                    {(maxHours * tick).toFixed(tick === 0 ? 0 : 1)}h
                                                  </text>
                                                </g>
                                              );
                                            })}
                                            {monthlyGraphData.points.map((point, index) => {
                                              const x = left + step * index;
                                              const barWidth = Math.max(10, Math.min(22, step * 0.45 || 22));
                                              const barHeight = (point.hours / maxHours) * plotHeight;
                                              const barY = top + plotHeight - barHeight;
                                              const payValue = calendarPayLineMode === "cumulative" ? point.cumulativePay : point.pay;
                                              const payY = top + plotHeight - (payValue / paySeriesMax) * plotHeight;
                                              return (
                                                <g key={point.key}>
                                                  {showHours && (
                                                  <rect
                                                    x={x - barWidth / 2}
                                                    y={barY}
                                                    width={barWidth}
                                                    height={barHeight}
                                                    rx="4"
                                                    fill={point.hasNightShift ? "rgba(139,92,246,0.42)" : "rgba(161,161,170,0.5)"}
                                                    className="cursor-pointer"
                                                    onMouseEnter={() => setHoveredGraphPointKey(point.key)}
                                                    onFocus={() => setHoveredGraphPointKey(point.key)}
                                                      onClick={() => selectCalendarDay(point.key)}
                                                    />
                                                  )}
                                                  {showPay && (
                                                    <circle
                                                      cx={x}
                                                      cy={payY}
                                                      r="5"
                                                      fill="rgb(253 186 116)"
                                                      className="cursor-pointer"
                                                      onMouseEnter={() => setHoveredGraphPointKey(point.key)}
                                                      onFocus={() => setHoveredGraphPointKey(point.key)}
                                                      onClick={() => selectCalendarDay(point.key)}
                                                    />
                                                  )}
                                                  <rect
                                                    x={x - Math.max(14, barWidth)}
                                                    y={top}
                                                    width={Math.max(28, barWidth * 2)}
                                                    height={plotHeight}
                                                    fill="transparent"
                                                    className="cursor-pointer"
                                                    onMouseEnter={() => setHoveredGraphPointKey(point.key)}
                                                    onFocus={() => setHoveredGraphPointKey(point.key)}
                                                    onClick={() => selectCalendarDay(point.key)}
                                                  />
                                                  <text
                                                    x={x}
                                                    y={height - 16}
                                                    textAnchor="middle"
                                                    fill="rgba(212,212,216,0.85)"
                                                    fontSize="10"
                                                    fontWeight="700"
                                                  >
                                                    {String(point.dayNumber).padStart(2, "0")}
                                                  </text>
                                                </g>
                                              );
                                            })}
                                            {showPay && (
                                              <path
                                                d={payPath}
                                                fill="none"
                                                stroke="rgb(253 186 116)"
                                                strokeWidth="2.5"
                                                strokeLinejoin="round"
                                                strokeLinecap="round"
                                              />
                                            )}
                                          </>
                                        );
                                      })()}
                                    </svg>
                                  </div>
                                  <div className="rounded border border-white/10 bg-white/[0.04] p-3 text-left">
                                    <p className="mb-2 text-[10px] font-black uppercase tracking-widest text-zinc-500">
                                      Informazioni sul giorno
                                    </p>
                                    {hoveredGraphPoint && (
                                      <>
                                        <div className="text-sm font-black text-white">{hoveredGraphPoint.key}</div>
                                        {hoveredGraphPoint.windowStart && hoveredGraphPoint.windowEnd && (
                                          <>
                                            <div className="mt-2 text-[10px] font-black uppercase tracking-widest text-zinc-400">
                                              Finestra oraria
                                            </div>
                                            <div className="text-lg font-black text-white">
                                              {hoveredGraphPoint.windowStart}-{hoveredGraphPoint.windowEnd}
                                            </div>
                                          </>
                                        )}
                                        <div className="mt-2 text-[10px] font-black uppercase tracking-widest text-zinc-400">
                                          Ore
                                        </div>
                                        <div className="text-lg font-black text-white">{hoveredGraphPoint.hours.toFixed(1)}h</div>
                                        {hoveredGraphPoint.nightHours > 0 && (
                                          <>
                                            <div className="mt-2 text-[10px] font-black uppercase tracking-widest text-zinc-400">
                                              Ore notturne
                                            </div>
                                            <div className="text-lg font-black text-violet-200">
                                              {hoveredGraphPoint.nightHours.toFixed(1)}h
                                            </div>
                                          </>
                                        )}
                                        <div className="mt-2 text-[10px] font-black uppercase tracking-widest text-zinc-400">
                                          {calendarPayLineMode === "cumulative" ? "Paga cumulata" : "Paga"}
                                        </div>
                                        <div className="text-lg font-black text-orange-200">
                                          EUR {(calendarPayLineMode === "cumulative" ? hoveredGraphPoint.cumulativePay : hoveredGraphPoint.pay).toFixed(2)}
                                        </div>
                                        <div className="mt-3 flex flex-wrap gap-2">
                                          {Object.entries(hoveredGraphPoint.payCodeTotals)
                                            .filter(([, hours]) => hours > 0)
                                            .map(([code, hours]) => (
                                              <span
                                                key={code}
                                                className="rounded border border-white/10 bg-white/[0.04] px-2 py-1 text-[9px] font-black uppercase tracking-tight text-zinc-300"
                                              >
                                                {getPayCode(code).label}: {hours.toFixed(2)}h
                                              </span>
                                            ))}
                                          {hoveredGraphPoint.mealVoucher > 0 && (
                                            <span className="rounded border border-white/10 bg-white/[0.04] px-2 py-1 text-[9px] font-black uppercase tracking-tight text-zinc-300">
                                              Buono pasto: EUR {hoveredGraphPoint.mealVoucher.toFixed(2)}
                                            </span>
                                          )}
                                          {hoveredGraphPoint.unpaidBreakMinutes > 0 && (
                                            <span className="rounded border border-red-400/15 bg-red-500/[0.06] px-2 py-1 text-[9px] font-black uppercase tracking-tight text-red-200/80">
                                              Pausa pranzo: -{hoveredGraphPoint.unpaidBreakMinutes.toFixed(0)} min
                                            </span>
                                          )}
                                        </div>
                                      </>
                                    )}
                                  </div>
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      )}

                    </div>
                    {mode === "track" && !activeTrackSession && (
                      <button
                        onClick={startSession}
                        className="w-full bg-white text-black py-5 rounded text-xl font-extrabold hover:bg-yellow-400 transition-all active:scale-[0.99] uppercase tracking-tight"
                      >
                        Inizia ora
                      </button>
                    )}
                  </div>
                </section>
              ) : (
                <section className="flex flex-col items-center">
                  <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 mb-8 rounded bg-black/30 p-1 w-full">
                    <button
                      onClick={() => setMode("calendar")}
                      className={`rounded px-4 py-3 text-xs font-black uppercase tracking-widest transition ${
                        mode === "calendar" ? "bg-white text-black" : "text-zinc-400 hover:text-white"
                      }`}
                    >
                      Calendario
                    </button>
                    <button
                      onClick={() => setMode("import")}
                      className={`rounded px-4 py-3 text-xs font-black uppercase tracking-widest transition ${
                        mode === "import" ? "bg-white text-black" : "text-zinc-400 hover:text-white"
                      }`}
                    >
                      Importa
                    </button>
                    <button
                      onClick={() => setMode("track")}
                      className={`rounded px-4 py-3 text-xs font-black uppercase tracking-widest transition ${
                        mode === "track" ? "bg-white text-black" : "text-zinc-400 hover:text-white"
                      }`}
                    >
                      Paga Live
                    </button>
                    <button
                      onClick={() => setMode("predict")}
                      className={`rounded px-4 py-3 text-xs font-black uppercase tracking-widest transition ${
                        mode === "predict" ? "bg-white text-black" : "text-zinc-400 hover:text-white"
                      }`}
                    >
                      Prevedi
                    </button>
                  </div>
                  <div className="text-center mb-10 w-full">
                    <div className="text-[4.5rem] sm:text-[6rem] md:text-[8rem] font-black tabular-nums leading-none tracking-tight mb-4 break-words">
                      EUR {currentBreakdown.total.toLocaleString("it-IT", {
                        minimumFractionDigits: 2,
                        maximumFractionDigits: 2,
                      })}
                    </div>
                    <div className="flex flex-wrap justify-center gap-3">
                      {Object.entries(currentBreakdown.payCodeTotals)
                        .filter(([, hours]) => hours > 0)
                        .map(([code, hours]) => (
                          <div
                            key={code}
                            className="bg-yellow-500/10 border border-yellow-500/30 text-yellow-200 text-[9px] font-black px-3 py-1 rounded uppercase tracking-tight"
                          >
                            {getPayCode(code).label}: {hours.toFixed(2)}h
                          </div>
                        ))}
                      {currentBreakdown.nightWeekdayExtra > 0 && (
                        <div className="bg-sky-500/10 border border-sky-500/30 text-sky-200 text-[9px] font-black px-3 py-1 rounded uppercase tracking-tight">
                          NTT (+50%): +EUR {currentBreakdown.nightWeekdayExtra.toFixed(2)}
                        </div>
                      )}
                      {currentBreakdown.nightSundayHolidayExtra > 0 && (
                        <div className="bg-emerald-500/10 border border-emerald-500/30 text-emerald-200 text-[9px] font-black px-3 py-1 rounded uppercase tracking-tight">
                          NTD (+55%): +EUR {currentBreakdown.nightSundayHolidayExtra.toFixed(2)}
                        </div>
                      )}
                      {currentBreakdown.mealVoucher > 0 && (
                        <div className="bg-emerald-500/10 border border-emerald-500/30 text-emerald-200 text-[9px] font-black px-3 py-1 rounded uppercase tracking-tight">
                          Buono pasto: EUR {currentBreakdown.mealVoucher.toFixed(2)}
                        </div>
                      )}
                      {currentBreakdown.unpaidBreakMs > 0 && (
                        <div className="bg-red-500/10 border border-red-500/30 text-red-200 text-[9px] font-black px-3 py-1 rounded uppercase tracking-tight">
                          Pausa pranzo: -30 min
                        </div>
                      )}
                    </div>
                  </div>

                  <div className="grid grid-cols-2 lg:grid-cols-4 gap-2 w-full mb-4">
                    <div className="bg-white/[0.04] border border-white/10 p-3 rounded text-left">
                      <p className="text-[9px] font-black text-zinc-500 uppercase mb-3 tracking-widest">
                        Ora inizio
                      </p>
                      <div className="flex items-center justify-between gap-2">
                        <button
                          onClick={() => adjustStart(-30)}
                          className="text-zinc-500 hover:text-white"
                          aria-label="Sposta indietro l'ora di inizio di 30 minuti"
                        >
                          <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24">
                            <path d="m15 18-6-6 6-6" />
                          </svg>
                        </button>
                        <span className="text-2xl font-bold tabular-nums">
                          {new Date(activeTrackSession.startTime).toLocaleTimeString("it-IT", {
                            hour: "2-digit",
                            minute: "2-digit",
                          })}
                        </span>
                        <button
                          onClick={() => adjustStart(30)}
                          className="text-zinc-500 hover:text-white"
                          aria-label="Sposta avanti l'ora di inizio di 30 minuti"
                        >
                          <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24">
                            <path d="m9 18 6-6-6-6" />
                          </svg>
                        </button>
                      </div>
                    </div>
                    <div className="bg-white/[0.04] border border-white/10 p-3 rounded text-left">
                      <p className="text-[9px] font-black text-zinc-500 uppercase mb-3 tracking-widest">
                        Trascorso
                      </p>
                      <span className="text-2xl font-bold tabular-nums">
                        {Math.floor(currentBreakdown.elapsed / 3600000).toString().padStart(2, "0")}:
                        {Math.floor((currentBreakdown.elapsed % 3600000) / 60000)
                          .toString()
                          .padStart(2, "0")}
                        :
                        {Math.floor((currentBreakdown.elapsed % 60000) / 1000)
                          .toString()
                          .padStart(2, "0")}
                      </span>
                    </div>
                    <div className="bg-white/[0.04] border border-white/10 p-3 rounded text-left">
                      <p className="text-[9px] font-black text-zinc-500 uppercase mb-3 tracking-widest">
                        Tariffa stimata
                      </p>
                      <span
                        className={`text-2xl font-bold ${
                          isNightShift(currentTime) ? "text-yellow-400" : "text-white"
                        }`}
                      >
                        EUR {liveRate.toFixed(2)}
                      </span>
                    </div>
                    <div className="bg-white/[0.04] border border-white/10 p-3 rounded text-left">
                      <p className="text-[9px] font-black text-zinc-500 uppercase mb-3 tracking-widest">
                        Fine automatica
                      </p>
                      <select
                        value={activeTrackSession?.autoEndTime ? formatTimeInput(new Date(activeTrackSession.autoEndTime)) : ""}
                        onChange={(event) => updateSessionAutoEnd(event.target.value)}
                        className="w-full bg-black/40 border border-white/10 rounded px-3 py-3 text-sm font-bold text-white"
                      >
                        <option value="" className="bg-zinc-950">
                          Disattivata
                        </option>
                        {TIME_OPTIONS.map((time) => (
                          <option key={time} value={time} className="bg-zinc-950">
                            {time}
                          </option>
                        ))}
                      </select>
                    </div>
                  </div>

                  <details className="w-full mb-10 rounded border border-white/10 bg-white/[0.03] p-3 text-left">
                    <summary className="cursor-pointer text-[10px] font-black uppercase tracking-widest text-zinc-400">
                      Totale di oggi
                    </summary>
                    <div className="mt-3 text-2xl font-black text-white">
                      EUR {todaySavedBreakdown.totalWithVoucher.toLocaleString("it-IT", {
                        minimumFractionDigits: 2,
                        maximumFractionDigits: 2,
                      })}
                    </div>
                    <div className="mt-2 text-xs font-bold uppercase tracking-widest text-zinc-500">
                      {(todaySavedBreakdown.paidElapsed / 3600000).toFixed(2)}h pagate
                    </div>
                    {todaySavedBreakdown.windows.length > 0 && (
                      <div className="mt-3 text-xs font-bold uppercase tracking-widest text-zinc-400">
                        {todaySavedBreakdown.windows.join(", ")}
                      </div>
                    )}
                    <div className="mt-3 flex flex-wrap gap-2">
                      {Object.entries(todaySavedBreakdown.payCodeTotals)
                        .filter(([, hours]) => hours > 0)
                        .map(([code, hours]) => (
                          <span
                            key={code}
                            className="rounded border border-white/10 bg-white/[0.04] px-2 py-1 text-[9px] font-black uppercase tracking-tight text-zinc-300"
                          >
                            {getPayCode(code).label}: {hours.toFixed(2)}h
                          </span>
                        ))}
                      {todaySavedBreakdown.nightWeekdayExtra > 0 && (
                        <span className="rounded border border-white/10 bg-white/[0.04] px-2 py-1 text-[9px] font-black uppercase tracking-tight text-zinc-300">
                          NTT: +EUR {todaySavedBreakdown.nightWeekdayExtra.toFixed(2)}
                        </span>
                      )}
                      {todaySavedBreakdown.nightSundayHolidayExtra > 0 && (
                        <span className="rounded border border-white/10 bg-white/[0.04] px-2 py-1 text-[9px] font-black uppercase tracking-tight text-zinc-300">
                          NTD: +EUR {todaySavedBreakdown.nightSundayHolidayExtra.toFixed(2)}
                        </span>
                      )}
                      {todaySavedBreakdown.mealVoucher > 0 && (
                        <span className="rounded border border-white/10 bg-white/[0.04] px-2 py-1 text-[9px] font-black uppercase tracking-tight text-zinc-300">
                          Buono pasto: EUR {todaySavedBreakdown.mealVoucher.toFixed(2)}
                        </span>
                      )}
                      {todaySavedBreakdown.unpaidBreakMs > 0 && (
                        <span className="rounded border border-red-400/15 bg-red-500/[0.06] px-2 py-1 text-[9px] font-black uppercase tracking-tight text-red-200/80">
                          Pausa pranzo: -{todaySavedBreakdown.unpaidBreakMs / 60000} min
                        </span>
                      )}
                    </div>
                  </details>
                </section>
              )}
            </main>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
