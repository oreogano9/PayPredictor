      const DEFAULT_CALENDAR_SHIFTS = [];
      const SICK_LEAVE_KEYWORDS = [
        "malattia",
        "mutua",
        "sick",
        "sick leave",
        "sick day",
        "sick note",
        "sickness",
        "illness",
        "medical leave",
        "medical absence",
        "off sick",
        "out sick",

      function isSeededTestShift(shift) {
        return String(shift.id).startsWith("seed-");
      }

      function isSickShift(shift) {
        return shift?.kind === "sick";
      }

      function createSickWorkShift(dateValue) {
        return {
          id: `derived-sick-${dateValue}`,
          date: dateValue,
          startTime: SICK_SHIFT_START,
          endTime: SICK_SHIFT_END,
          source: "derived",
          kind: "sick",
          note: "Malattia",
        };
      }

      function readLocalState() {
        const fallback = { session: null, weeklyStats: { totalHours: 0, totalEarned: 0 }, calendarShifts: DEFAULT_CALENDAR_SHIFTS };

        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
          if (!saved) return fallback;
          return {
            ...fallback,
            ...saved,
            calendarShifts:
              Array.isArray(saved.calendarShifts) && saved.calendarShifts.length > 0
                ? saved.calendarShifts
                : DEFAULT_CALENDAR_SHIFTS,
          };
        } catch {
          return fallback;
        }
      }

      function writeLocalState(nextState) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(nextState));
        window.dispatchEvent(new Event("earnings-tracker:storage"));
      }

      function readLocalSettings() {
        const fallback = { googleCalendarIcsUrl: "", paysForParking: true };

        try {
          const saved = JSON.parse(localStorage.getItem(SETTINGS_STORAGE_KEY));
          return saved ? { ...fallback, ...saved } : fallback;
        } catch {
          return fallback;
        }
      }

      function writeLocalSettings(nextSettings) {
        localStorage.setItem(SETTINGS_STORAGE_KEY, JSON.stringify(nextSettings));
      }

      function unfoldIcsLines(text) {
        return text.replace(/\r?\n[ \t]/g, "");
      }

      function parseIcsDateValue(value) {
        if (!value) return null;
        if (/^\d{8}$/.test(value)) {
          const year = Number(value.slice(0, 4));
          const month = Number(value.slice(4, 6)) - 1;
          const day = Number(value.slice(6, 8));
          return new Date(year, month, day, 0, 0, 0, 0);
        }
        if (/^\d{8}T\d{6}Z$/.test(value)) {
          const year = Number(value.slice(0, 4));
          const month = Number(value.slice(4, 6)) - 1;
          const day = Number(value.slice(6, 8));
          const hour = Number(value.slice(9, 11));
          const minute = Number(value.slice(11, 13));
          const second = Number(value.slice(13, 15));
          return new Date(Date.UTC(year, month, day, hour, minute, second));
        }
        if (/^\d{8}T\d{6}$/.test(value)) {
          const year = Number(value.slice(0, 4));
          const month = Number(value.slice(4, 6)) - 1;
          const day = Number(value.slice(6, 8));
          const hour = Number(value.slice(9, 11));
          const minute = Number(value.slice(11, 13));
          const second = Number(value.slice(13, 15));
          return new Date(year, month, day, hour, minute, second);
        }
        return null;
      }

      function getIcsField(eventText, fieldName) {
        const match = eventText.match(new RegExp(`^${fieldName}(?:;[^:\\n]+)?:([^\\n\\r]+)`, "m"));
        return match?.[1]?.trim() || "";
      }

      function decodeIcsText(value) {
        return value
          .replace(/\\n/gi, " ")
          .replace(/\\,/g, ",")
          .replace(/\\;/g, ";")
          .replace(/\\\\/g, "\\")
          .trim();
      }

      function isSickLeaveSummary(summary) {
        const normalizedSummary = summary.toLocaleLowerCase("it-IT");
        return SICK_LEAVE_KEYWORDS.some((keyword) => normalizedSummary.includes(keyword));
      }

      function enumerateIcsDates(start, end, isAllDay) {
        if (!start) return [];
        const dates = [];
        const cursor = new Date(start.getFullYear(), start.getMonth(), start.getDate());
        const final = end
          ? new Date(end.getFullYear(), end.getMonth(), end.getDate())
          : new Date(cursor);

        if (!isAllDay && end && end.getTime() > final.getTime()) {
          final.setDate(final.getDate() + 1);
        }

        while (cursor < final || dates.length === 0) {
          dates.push(formatDateInput(cursor));
          cursor.setDate(cursor.getDate() + 1);
          if (dates.length > 366) break;
        }

        return dates;
      }

      const IMPORT_MONTH_LOOKUP = {
        jan: 0,
        january: 0,
        gen: 0,
        gennaio: 0,
        feb: 1,
        february: 1,
        febbraio: 1,
        mar: 2,
        march: 2,
        marzo: 2,
        apr: 3,
        april: 3,
        aprile: 3,
        may: 4,
        maggio: 4,
        jun: 5,
        june: 5,
        giugno: 5,
        giu: 5,
        jul: 6,
        july: 6,
        luglio: 6,
        lug: 6,
        aug: 7,
        august: 7,
        agosto: 7,
        ago: 7,
        sep: 8,
        sept: 8,
        september: 8,
        settembre: 8,
        set: 8,
        oct: 9,
        october: 9,
        ottobre: 9,
        ott: 9,
        nov: 10,
        november: 10,
        novembre: 10,
        dec: 11,
        december: 11,
        dicembre: 11,
        dic: 11,
      };

      function formatImportTime(decimalHours) {
        const totalMinutes = Math.round(decimalHours * 60);
        const hours = Math.floor(totalMinutes / 60) % 24;
        const minutes = totalMinutes % 60;
        return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}`;
      }

      function decodeShiftCode(code) {
        const duration = Number(code[0]);
        const slotIndex = Number(code.slice(1));
        const startHour = (4 + Math.floor((slotIndex - 1) / 2)) % 24;
        const startMinutes = ((slotIndex - 1) % 2) * 30;
        const startDecimal = startHour + startMinutes / 60;
        const endDecimal = (startDecimal + duration) % 24;
        return {
          duration,
          startTime: formatImportTime(startDecimal),
          endTime: formatImportTime(endDecimal),
        };
      }

      function normalizeImportLine(line) {
        return line
          .replace(/[–—]/g, "-")
          .replace(/\s+/g, " ")
          .trim();
      }

      function parseImportDate(line, fallbackYear) {
        const isoMatch = line.match(/\b(20\d{2})-(\d{1,2})-(\d{1,2})\b/);
        if (isoMatch) {
          return {
            date: new Date(Number(isoMatch[1]), Number(isoMatch[2]) - 1, Number(isoMatch[3])),
            matchedText: isoMatch[0],
          };
        }

        const textMatch = line.match(
          /\b(\d{1,2})\s+([A-Za-zÀ-ÿ]+)(?:\s+(\d{2}|\d{4}))?\b|\b([A-Za-zÀ-ÿ]+)\s+(\d{1,2})(?:\s+(\d{2}|\d{4}))?\b/i,
        );
        if (textMatch) {
          const monthToken = (textMatch[2] || textMatch[4] || "").toLowerCase();
          const month = IMPORT_MONTH_LOOKUP[monthToken];
          if (month !== undefined) {
            const day = Number(textMatch[1] || textMatch[5]);
            const yearToken = textMatch[3] || textMatch[6];
            const yearValue = yearToken
              ? Number(yearToken.length === 2 ? `20${yearToken}` : yearToken)
              : fallbackYear;

            return {
              date: new Date(yearValue, month, day),
              matchedText: textMatch[0],
            };
          }
        }

        const numericMatches = Array.from(
          line.matchAll(/\b(\d{1,2})[\/\-\.](\d{1,2})(?:[\/\-\.](\d{2}|\d{4}))?\b/g),
        );
        const numericMatch = numericMatches.find((match) => {
          const before = line[match.index - 1] || "";
          const after = line[match.index + match[0].length] || "";
          return before !== ":" && after !== ":" && Number(match[1]) >= 1 && Number(match[1]) <= 31 && Number(match[2]) >= 1 && Number(match[2]) <= 12;
        });

        if (numericMatch) {
          const day = Number(numericMatch[1]);
          const month = Number(numericMatch[2]) - 1;
          const yearValue = numericMatch[3]
            ? Number(numericMatch[3].length === 2 ? `20${numericMatch[3]}` : numericMatch[3])
            : fallbackYear;
          return {
            date: new Date(yearValue, month, day),
            matchedText: numericMatch[0],
          };
        }

        return null;
      }

      function parseImportedLine(line, fallbackYear) {
        const normalizedLine = normalizeImportLine(line);
        if (!normalizedLine) return null;

        const dateInfo = parseImportDate(normalizedLine, fallbackYear);
        if (!dateInfo || Number.isNaN(dateInfo.date.getTime())) return null;

        const lineWithoutDate = normalizedLine.replace(dateInfo.matchedText, "").trim();
        const freeMatch = lineWithoutDate.match(/\b(RIP|FNL|FR|FERIE|RIPOSO|MALATTIA|MUTUA|SICK|SICK LEAVE|SICK DAY)\b/i);
        const codeMatch = lineWithoutDate.match(/\b([4-8](?:0[1-9]|[1-3][0-9]|4[0-8]))\b/);
        const timeMatch = lineWithoutDate.match(/\b(\d{1,2})[:\.](\d{2})\s*(?:-|to)\s*(\d{1,2})[:\.](\d{2})\b/i);

        if (freeMatch) {
          const token = freeMatch[1].toUpperCase();
          if (isSickLeaveSummary(lineWithoutDate)) {
            return {
              kind: "sick",
              date: formatDateInput(dateInfo.date),
              allDay: true,
              summary: "Malattia",
              note: "Malattia",
            };
          }

          const summary =
            token === "RIP" || token === "RIPOSO"
              ? "Riposo"
              : token === "FR" || token === "FERIE"
                ? "Ferie"
                : "Da definire";
          return {
            kind: "free",
            date: formatDateInput(dateInfo.date),
            allDay: true,
            summary,
            note: summary,
          };
        }

        if (timeMatch) {
          const startTime = `${String(Number(timeMatch[1])).padStart(2, "0")}:${timeMatch[2]}`;
          const endTime = `${String(Number(timeMatch[3])).padStart(2, "0")}:${timeMatch[4]}`;
          const explicitNote = lineWithoutDate
            .replace(timeMatch[0], "")
            .replace(codeMatch?.[0] || "", "")
            .trim();
          const note = [codeMatch?.[1] || "", explicitNote].filter(Boolean).join(" ");
          return {
            kind: "work",
            date: formatDateInput(dateInfo.date),
            startTime,
            endTime,
            allDay: false,
            summary: codeMatch ? `Turno ${codeMatch[1]}` : "Turno lavoro",
            note: note || "Orario esplicito",
          };
        }

        if (codeMatch) {
          const code = codeMatch[1];
          const decoded = decodeShiftCode(code);
          return {
            kind: "work",
            date: formatDateInput(dateInfo.date),
            startTime: decoded.startTime,
            endTime: decoded.endTime,
            allDay: false,
            summary: `Turno ${code}`,
            note: code,
          };
        }

        return null;
      }

      function inferImportYear(text, fallbackYear) {
        const yearMatch = text.match(/\b(20\d{2})\b/);
        return yearMatch ? Number(yearMatch[1]) : fallbackYear;
      }

      function parseImportMatrixHeader(line, fallbackYear) {
        if (!/\bDipendenti\b/i.test(line)) return null;
        const dates = [];
        const dateMatches = line.matchAll(/\b(?:Lu|Ma|Me|Gi|Ve|Sa|Do)\.\s*(\d{1,2})\.(\d{1,2})\./gi);
        for (const match of dateMatches) {
          dates.push({
            day: Number(match[1]),
            month: Number(match[2]) - 1,
            year: fallbackYear,
          });
        }
        return dates.length > 0 ? dates : null;
      }

      function parseImportedMatrixTextToEvents(text, fallbackYear, personQuery) {
        const query = String(personQuery || "").trim().toLocaleLowerCase("it-IT");
        if (!query) return [];

        const lines = text.split("\n").map(normalizeImportLine).filter(Boolean);
        const headerIndex = lines.findIndex((line) => parseImportMatrixHeader(line, fallbackYear));
        if (headerIndex === -1) return [];

        const year = inferImportYear(text, fallbackYear);
        const dates = parseImportMatrixHeader(lines[headerIndex], year);
        if (!dates?.length) return [];

        const row = lines.slice(headerIndex + 1).find((line) => line.toLocaleLowerCase("it-IT").includes(query));
        if (!row) return [];

        const rowMatch = row.match(/^(.+?)\s+(\d{5,})\s+(.+)$/);
        if (!rowMatch) return [];

        const employeeName = rowMatch[1].trim();
        const employeeId = rowMatch[2].trim();
        const dayTokens = rowMatch[3].trim().split(/\s+/).slice(0, dates.length);

        return dayTokens
          .map((token, index) => {
            const dateInfo = dates[index];
            if (!dateInfo) return null;
            const date = formatDateInput(new Date(dateInfo.year, dateInfo.month, dateInfo.day));
            const normalizedToken = token.toUpperCase();

            if (/^[4-8](?:0[1-9]|[1-3][0-9]|4[0-8])$/.test(normalizedToken)) {
              const decoded = decodeShiftCode(normalizedToken);
              return {
                id: `matrix-${employeeId}-${date}-${index}`,
                kind: "work",
                date,
                startTime: decoded.startTime,
                endTime: decoded.endTime,
                allDay: false,
                summary: `Turno ${normalizedToken}`,
                note: normalizedToken,
                employeeName,
              };
            }

            const summary =
              normalizedToken === "RIP"
                ? "Riposo"
                : normalizedToken === "FR"
                  ? "Ferie"
                  : normalizedToken === "FNL"
                    ? "Da definire"
                    : normalizedToken === "OF"
                      ? "Fuori turno"
                      : normalizedToken;

            return {
              id: `matrix-${employeeId}-${date}-${index}`,
              kind: "free",
              date,
              allDay: true,
              summary,
              note: normalizedToken,
              employeeName,
            };
          })
          .filter(Boolean);
      }

      function expandImportedLines(text, fallbackYear) {
        const lines = text.split("\n");
        const expanded = [];
        let lastDate = null;

        for (const rawLine of lines) {
          const normalizedLine = normalizeImportLine(rawLine);
          if (!normalizedLine) {
            expanded.push(rawLine);
            continue;
          }

          const parsed = parseImportedLine(normalizedLine, fallbackYear);
          if (parsed?.date) {
            const currentDate = new Date(`${parsed.date}T00:00:00`);
            if (lastDate) {
              const diffDays = Math.round((currentDate.getTime() - lastDate.getTime()) / 86400000);
              if (diffDays > 1 && diffDays <= 20) {
                for (let i = 1; i < diffDays; i += 1) {
                  const missingDate = new Date(lastDate);
                  missingDate.setDate(missingDate.getDate() + i);
                  expanded.push(`${formatDateInput(missingDate)} RIP`);
                }
              }
            }
            lastDate = currentDate;
          }

          expanded.push(rawLine);
        }

        return expanded;
      }

      function parseImportedTextToEvents(text, fallbackYear, personQuery = "") {
        const matrixEvents = parseImportedMatrixTextToEvents(text, fallbackYear, personQuery);
        if (matrixEvents.length > 0) return matrixEvents;

        return expandImportedLines(text, fallbackYear)
          .map((line, index) => {
            const parsed = parseImportedLine(line, fallbackYear);
            if (!parsed) return null;
            return {
              id: `extracted-${parsed.date}-${index}`,
              ...parsed,
            };
          })
          .filter(Boolean);
      }

      function extractedEventsToCalendarShifts(events) {
        return events
          .filter((event) => event.kind === "work" || event.kind === "sick")
          .map((event) =>
            event.kind === "sick"
              ? {
                  id: event.id,
                  date: event.date,
                  startTime: "00:00",
                  endTime: "00:00",
                  source: "local-extracted",
                  kind: "sick",
                  note: "Malattia",
                }
              : {
                  id: event.id,
                  date: event.date,
                  startTime: event.startTime,
                  endTime: event.endTime,
                  source: "local-extracted",
                  note: event.note,
                },
          );
      }

      function buildGoogleCalendarCsv(events) {
        const rows = [["Subject", "Start Date", "Start Time", "End Date", "End Time", "All Day Event", "Description"]];
        const csvDate = (dateValue) => {
          const date = new Date(`${dateValue}T00:00:00`);
          return `${String(date.getMonth() + 1).padStart(2, "0")}/${String(date.getDate()).padStart(2, "0")}/${date.getFullYear()}`;
        };

        events.forEach((event) => {
          if (event.allDay) {
            rows.push([event.summary, csvDate(event.date), "", csvDate(event.date), "", "True", event.note || ""]);
            return;
          }

          const start = buildDateTime(event.date, event.startTime);
          let end = buildDateTime(event.date, event.endTime);
          if (end <= start) end = new Date(end.getTime() + 24 * 3600000);
          rows.push([
            event.summary,
            csvDate(event.date),
            event.startTime,
            csvDate(formatDateInput(end)),
            event.endTime,
            "False",
            event.note || "",
          ]);
        });

        return rows
          .map((row) =>
            row
              .map((value) => `"${String(value ?? "").replace(/"/g, '""')}"`)
              .join(","),
          )
          .join("\n");
      }

      async function ensurePdfJs() {
        if (window.pdfjsLib) return window.pdfjsLib;
        await new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js";
          script.onload = resolve;
          script.onerror = reject;
          document.head.appendChild(script);
        });
        window.pdfjsLib.GlobalWorkerOptions.workerSrc =
          "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";
        return window.pdfjsLib;
      }

      async function extractPdfLines(file) {
        const pdfjsLib = await ensurePdfJs();
        const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
        const pages = [];

        for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber += 1) {
          const page = await pdf.getPage(pageNumber);
          const textContent = await page.getTextContent();
          const lines = [];

          textContent.items.forEach((item) => {
            const x = item.transform[4];
            const y = item.transform[5];
            const text = normalizeImportLine(item.str);
            if (!text) return;

            let line = lines.find((entry) => Math.abs(entry.y - y) < 2.5);
            if (!line) {
              line = { y, parts: [] };
              lines.push(line);
            }
            line.parts.push({ x, text });
          });

          lines
            .sort((left, right) => right.y - left.y)
            .forEach((line) => {
              const joined = line.parts
                .sort((left, right) => left.x - right.x)
                .map((part) => part.text)
                .join(" ")
                .replace(/\s+/g, " ")
                .trim();
              if (joined) pages.push(joined);
            });
        }

        return pages.join("\n");
      }

      function parsePublicIcsToShifts(icsText) {
        const unfolded = unfoldIcsLines(icsText);
        const events = unfolded.split("BEGIN:VEVENT").slice(1);
        const shifts = [];

        events.forEach((eventText, index) => {
          const dtStartValue = getIcsField(eventText, "DTSTART");
          const dtEndValue = getIcsField(eventText, "DTEND");
          const summary = decodeIcsText(getIcsField(eventText, "SUMMARY"));
          const isAllDay = /DTSTART;VALUE=DATE/i.test(eventText) || /DTEND;VALUE=DATE/i.test(eventText);
          const start = parseIcsDateValue(dtStartValue);
          const end = parseIcsDateValue(dtEndValue);
          const isSickLeave = isSickLeaveSummary(summary);

          if (!dtStartValue || (!dtEndValue && !isSickLeave)) {
            return;
          }

          if (isSickLeave) {
            const sickDates = enumerateIcsDates(start, end, isAllDay);
            sickDates.forEach((dateValue, sickIndex) => {
              shifts.push({
                id: `ical-sick-${dateValue}-${index}-${sickIndex}`,
                date: dateValue,
                startTime: "00:00",
                endTime: "00:00",
                source: "ical",
                kind: "sick",
                note: "Malattia",
              });
            });
            return;
          }

          if (isAllDay || !start || !end || end <= start) {
            return;
          }

          shifts.push({
            id: `ical-${formatDateInput(start)}-${formatTimeInput(start)}-${index}`,
            date: formatDateInput(start),
            startTime: formatTimeInput(start),
            endTime: formatTimeInput(end),
            source: "ical",
          });
        });

        return shifts;
      }

      function roundToHalfHour(date) {
        const rounded = new Date(date);
        rounded.setMinutes(Math.round(rounded.getMinutes() / 30) * 30);
        rounded.setSeconds(0);
        rounded.setMilliseconds(0);
        return rounded;
      }

      function formatDateInput(date) {
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(
          date.getDate(),
        ).padStart(2, "0")}`;
      }

      function formatMonthInput(date) {
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
      }

      function formatTimeInput(date) {
        return `${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
      }

      function buildDateTime(dateValue, timeValue) {
        const [year, month, day] = dateValue.split("-").map(Number);
        const [hours, minutes] = timeValue.split(":").map(Number);
        return new Date(year, month - 1, day, hours, minutes, 0, 0);
      }

      function createEmptyBreakdown() {
        return {
          total: 0,
          base: 0,
          payCodeTotals: { ORD: 0, S15: 0, S25: 0, S50: 0 },
          nightExtra: 0,
          nightWeekdayExtra: 0,
          nightSundayHolidayExtra: 0,
          nightWeekdayHours: 0,
          nightSundayHolidayHours: 0,
          mealVoucher: 0,
          elapsed: 0,
          paidElapsed: 0,
          unpaidBreakMs: 0,
        };
      }

      function mergeBreakdowns(left, right) {
        return {
          total: left.total + right.total,
          base: left.base + right.base,
          payCodeTotals: {
            ORD: left.payCodeTotals.ORD + right.payCodeTotals.ORD,
            S15: left.payCodeTotals.S15 + right.payCodeTotals.S15,
            S25: left.payCodeTotals.S25 + right.payCodeTotals.S25,
            S50: left.payCodeTotals.S50 + right.payCodeTotals.S50,
          },
          nightExtra: left.nightExtra + right.nightExtra,
          nightWeekdayExtra: left.nightWeekdayExtra + right.nightWeekdayExtra,
          nightSundayHolidayExtra: left.nightSundayHolidayExtra + right.nightSundayHolidayExtra,
          nightWeekdayHours: left.nightWeekdayHours + right.nightWeekdayHours,
          nightSundayHolidayHours: left.nightSundayHolidayHours + right.nightSundayHolidayHours,
          mealVoucher: left.mealVoucher + right.mealVoucher,
          elapsed: left.elapsed + right.elapsed,
          paidElapsed: left.paidElapsed + right.paidElapsed,
          unpaidBreakMs: left.unpaidBreakMs + right.unpaidBreakMs,
        };
      }

      const TIME_OPTIONS = Array.from({ length: 48 }, (_, index) => {
        const hours = Math.floor(index / 2);
        const minutes = index % 2 === 0 ? "00" : "30";
        return `${String(hours).padStart(2, "0")}:${minutes}`;
      });
      const WEEKDAY_LABELS = ["Lun", "Mar", "Mer", "Gio", "Ven", "Sab", "Dom"];
      const MONTH_OPTIONS = [
        "Gennaio",
        "Febbraio",
        "Marzo",
        "Aprile",
        "Maggio",
        "Giugno",
        "Luglio",
        "Agosto",
        "Settembre",
        "Ottobre",
        "Novembre",
        "Dicembre",
      ];
      const currentYear = new Date().getFullYear();
      const YEAR_OPTIONS = Array.from({ length: 5 }, (_, index) => currentYear - 2 + index);
      const roundCurrency = (amount) => Math.round((amount + Number.EPSILON) * 100) / 100;
      const formatEuro = (amount) =>
        `EUR ${amount.toLocaleString("it-IT", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
      const getTotalNightHours = (breakdownLike) =>
        (breakdownLike.nightWeekdayHours || 0) + (breakdownLike.nightSundayHolidayHours || 0);

      function App() {
        const [user, setUser] = useState(null);
        const [session, setSession] = useState(null);
        const [autoTrackSession, setAutoTrackSession] = useState(null);
        const [dismissedAutoTrackDate, setDismissedAutoTrackDate] = useState("");
        const [weeklyStats, setWeeklyStats] = useState({ totalHours: 0, totalEarned: 0 });
        const [mode, setMode] = useState("calendar");
        const [selectedStartTime, setSelectedStartTime] = useState(() => formatTimeInput(roundToHalfHour(new Date())));
        const [predictionDate, setPredictionDate] = useState(() => formatDateInput(new Date()));
        const [predictionStartTime, setPredictionStartTime] = useState(() => formatTimeInput(roundToHalfHour(new Date())));
        const [predictionEndTime, setPredictionEndTime] = useState(() =>
          formatTimeInput(new Date(roundToHalfHour(new Date()).getTime() + 6 * 3600000)),
        );
        const [calendarShifts, setCalendarShifts] = useState([]);
        const [importedCalendarShifts, setImportedCalendarShifts] = useState([]);
        const [calendarMonth, setCalendarMonth] = useState(() => formatMonthInput(new Date()));
        const [calendarDate, setCalendarDate] = useState(() => formatDateInput(new Date()));
        const [calendarView, setCalendarView] = useState("plan");
        const [calendarGraphMode, setCalendarGraphMode] = useState("both");
        const [calendarPayLineMode, setCalendarPayLineMode] = useState("daily");
        const [hoveredGraphPointKey, setHoveredGraphPointKey] = useState(null);
        const [importText, setImportText] = useState("");
        const [importPersonQuery, setImportPersonQuery] = useState("");
        const [importedEventsPreview, setImportedEventsPreview] = useState([]);
        const [importStatus, setImportStatus] = useState("");
        const [isImportingFile, setIsImportingFile] = useState(false);
        const [importCopied, setImportCopied] = useState(false);
        const [importShowShiftCode, setImportShowShiftCode] = useState(true);
        const [importShowWeekdays, setImportShowWeekdays] = useState(true);
        const [importShowGym, setImportShowGym] = useState(false);
        const [importShowSleep, setImportShowSleep] = useState(false);
        const [importShowBonuses, setImportShowBonuses] = useState(true);
        const [importOutputFontSize, setImportOutputFontSize] = useState(11);
        const [copyMonthStatus, setCopyMonthStatus] = useState("");
        const [settingsOpen, setSettingsOpen] = useState(false);
        const [googleCalendarIcsUrl, setGoogleCalendarIcsUrl] = useState(() => readLocalSettings().googleCalendarIcsUrl || "");
        const [paysForParking, setPaysForParking] = useState(() => readLocalSettings().paysForParking !== false);
        const [settingsStatus, setSettingsStatus] = useState("");
        const [icalSyncStatus, setIcalSyncStatus] = useState("");
        const [currentTime, setCurrentTime] = useState(new Date());
        const autoEndingRef = useRef(false);
        const cleanedSeedShiftsRef = useRef(false);
        const pdfImportInputRef = useRef(null);
        const [loading, setLoading] = useState(true);
        const [services, setServices] = useState(null);
        const isLocalMode = !firebaseConfig;

        useEffect(() => {
          if (!firebaseConfig) {
            setUser({ uid: "local-user" });
            setLoading(false);
            return;
          }

          const firebaseApp = firebase.initializeApp(firebaseConfig);
          const auth = firebase.auth(firebaseApp);
          const db = firebase.firestore(firebaseApp);
          setServices({ auth, db });

          const initAuth = async () => {
            try {
              if (
                typeof window.__initial_auth_token !== "undefined" &&
                window.__initial_auth_token
              ) {
                await auth.signInWithCustomToken(window.__initial_auth_token);
              } else {
                await auth.signInAnonymously();
              }
            } catch (err) {
              console.error("Errore autenticazione", err);
            }
          };

          initAuth();
          return auth.onAuthStateChanged((nextUser) => {
            setUser(nextUser);
            setLoading(false);
          });
        }, []);

        useEffect(() => {
          if (!user) return undefined;

          if (isLocalMode) {
            const syncLocalState = () => {
              const data = readLocalState();
              setSession(data.session || null);
              setWeeklyStats(data.weeklyStats || { totalHours: 0, totalEarned: 0 });
              setCalendarShifts(data.calendarShifts || []);
            };

            syncLocalState();
            window.addEventListener("earnings-tracker:storage", syncLocalState);
            return () => window.removeEventListener("earnings-tracker:storage", syncLocalState);
          }

          if (!services) return undefined;

          const userDocRef = services.db
            .collection("artifacts")
            .doc(appId)
            .collection("users")
            .doc(user.uid)
            .collection("settings")
            .doc("main");

          return userDocRef.onSnapshot((snap) => {
            if (snap.exists) {
              const data = snap.data();
              setSession(data.session || null);
              setWeeklyStats(data.weeklyStats || { totalHours: 0, totalEarned: 0 });
              setCalendarShifts(data.calendarShifts || []);
            }
          });
        }, [isLocalMode, services, user]);

        useEffect(() => {
          const timer = setInterval(() => setCurrentTime(new Date()), 100);
          return () => clearInterval(timer);
        }, []);

        useEffect(() => {
          if (session) {
            setAutoTrackSession(null);
            return;
          }

          const today = formatDateInput(currentTime);
          if (dismissedAutoTrackDate === today) {
            setAutoTrackSession(null);
            return;
          }

          if (allCalendarShifts.some((shift) => shift.date === today && isSickShift(shift))) {
            setAutoTrackSession(null);
            return;
          }

          const todayShifts = allCalendarShifts
            .filter((shift) => shift.date === today && !isSickShift(shift))
            .sort((a, b) => a.startTime.localeCompare(b.startTime));

          if (todayShifts.length === 0) {
            setAutoTrackSession(null);
            return;
          }

          const nowMs = currentTime.getTime();
          const ranges = todayShifts.map((shift) => ({
            shift,
            ...getShiftRange(shift.date, shift.startTime, shift.endTime),
          }));
          const ongoing = ranges.find(({ start, end }) => start.getTime() <= nowMs && nowMs < end.getTime());

          if (ongoing) {
            setAutoTrackSession((prev) =>
              prev &&
              prev.prefillDate === today &&
              prev.startTime === ongoing.start.getTime() &&
              prev.autoEndTime === ongoing.end.getTime() &&
              prev.autoPrefilled
                ? prev
                : {
                    startTime: ongoing.start.getTime(),
                    autoEndTime: ongoing.end.getTime(),
                    prefillDate: today,
                    autoPrefilled: true,
                  },
            );
            return;
          }

          const completed = ranges.filter(({ end }) => end.getTime() <= nowMs);
          const upcoming = ranges.find(({ start }) => start.getTime() > nowMs);
          if (upcoming) {
            setAutoTrackSession((prev) =>
              prev &&
              prev.prefillDate === today &&
              prev.startTime === upcoming.start.getTime() &&
              prev.autoEndTime === upcoming.end.getTime() &&
              prev.autoPrefilled
                ? prev
                : {
                    startTime: upcoming.start.getTime(),
                    autoEndTime: upcoming.end.getTime(),
                    prefillDate: today,
                    autoPrefilled: true,
                  },
            );
            return;
          }

          if (completed.length === 0) {
            setAutoTrackSession(null);
            return;
          }

          const latestCompleted = completed[completed.length - 1];
          if (latestCompleted && !ranges.some(({ start }) => start.getTime() > nowMs)) {
            setAutoTrackSession(null);
          }
        }, [allCalendarShifts, currentTime, dismissedAutoTrackDate, session]);

        const activeTrackSession = session || autoTrackSession;

        useEffect(() => {
          let cancelled = false;

          const syncIcal = async () => {
            const nextUrl = googleCalendarIcsUrl.trim();
            if (!nextUrl) {
              setImportedCalendarShifts([]);
              setIcalSyncStatus("");
              return;
            }

            setIcalSyncStatus("Sincronizzazione calendario in corso...");
            try {
              const response = await fetch(`/api/ical?url=${encodeURIComponent(nextUrl)}`);
              if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
              }
              const text = await response.text();
              const shifts = parsePublicIcsToShifts(text);
              if (cancelled) return;
              const localShiftsWithoutSeeds = calendarShifts.filter((shift) => !isSeededTestShift(shift));
              if (!cleanedSeedShiftsRef.current && localShiftsWithoutSeeds.length !== calendarShifts.length) {
                cleanedSeedShiftsRef.current = true;
                setCalendarShifts(localShiftsWithoutSeeds);
                await saveState({ calendarShifts: localShiftsWithoutSeeds });
              }
              setImportedCalendarShifts(shifts);
              setIcalSyncStatus(`Calendario importato: ${shifts.length} voci lette`);
            } catch (error) {
              console.error("Errore sync iCal", error);
              if (cancelled) return;
              setImportedCalendarShifts([]);
              setIcalSyncStatus("Impossibile leggere l'iCal tramite proxy.");
            }
          };

          syncIcal();
          return () => {
            cancelled = true;
          };
        }, [calendarShifts, googleCalendarIcsUrl]);

        const allCalendarShifts = useMemo(
          () => {
            const deduped = new Map();
            [...calendarShifts.filter((shift) => !isSeededTestShift(shift)), ...importedCalendarShifts].forEach((shift) => {
              const key = [
                shift.kind || "work",
                shift.date,
                shift.startTime,
                shift.endTime,
              ].join("|");
              deduped.set(key, shift);
            });
            return [...deduped.values()].sort((a, b) =>
              `${a.date} ${a.startTime}`.localeCompare(`${b.date} ${b.startTime}`),
            );
          },
          [calendarShifts, importedCalendarShifts],
        );
        const sickDateSet = useMemo(
          () => new Set(allCalendarShifts.filter(isSickShift).map((shift) => shift.date)),
          [allCalendarShifts],
        );
        const effectiveCalendarShifts = useMemo(
          () =>
            [
              ...allCalendarShifts.filter((shift) => !isSickShift(shift) && !sickDateSet.has(shift.date)),
              ...Array.from(sickDateSet).map(createSickWorkShift),
            ].sort((a, b) =>
              `${a.date} ${a.startTime}`.localeCompare(`${b.date} ${b.startTime}`),
            ),
          [allCalendarShifts, sickDateSet],
        );

        const calculateStoredDayPrefill = React.useCallback(
          (dateValue, cutoffMs, baseWeeklyHours = 0) => {
            const dayShifts = effectiveCalendarShifts
              .filter((shift) => shift.date === dateValue)
              .sort((a, b) => a.startTime.localeCompare(b.startTime));

            let aggregate = createEmptyBreakdown();
            let paidHoursBefore = 0;

            for (const shift of dayShifts) {
              const { start, end } = getShiftRange(shift.date, shift.startTime, shift.endTime);
              if (end.getTime() > cutoffMs) {
                continue;
              }
              const breakdown = calculateShiftBreakdown(
                shift,
                baseWeeklyHours + paidHoursBefore,
                baseWeeklyHours + paidHoursBefore,
              );
              aggregate = mergeBreakdowns(aggregate, breakdown);
              paidHoursBefore += breakdown.paidElapsed / 3600000;
            }

            return { aggregate, paidHoursBefore };
          },
          [effectiveCalendarShifts],
        );

        const saveState = async (nextState) => {
          if (!user) return;

          if (isLocalMode) {
            writeLocalState({ session, weeklyStats, calendarShifts, ...nextState });
            return;
          }

          const userDocRef = services.db
            .collection("artifacts")
            .doc(appId)
            .collection("users")
            .doc(user.uid)
            .collection("settings")
            .doc("main");

          await userDocRef.set(nextState, { merge: true });
        };

        const isNightShift = (date) => {
          const hours = date.getHours();
          return hours >= 20 || hours < 8;
        };

        const isSunday = (date) => date.getDay() === 0;

        const getHoliday = (date) => {
          const monthDay = `${String(date.getMonth() + 1).padStart(2, "0")}-${String(
            date.getDate(),
          ).padStart(2, "0")}`;
          return ITALIAN_HOLIDAYS[monthDay] || ITALIAN_HOLIDAYS[`${date.getFullYear()}-${monthDay}`] || null;
        };

        const isSundayOrHoliday = (date) => isSunday(date) || Boolean(getHoliday(date));

        const getPayCode = (payCode) => PAY_CODES[payCode] || PAY_CODES.ORD;

        const getAutomaticPayCode = (
          date,
          cumulativeRegularScopeHours,
          cumulativeWeeklyHours = cumulativeRegularScopeHours,
          regularThreshold = WEEKLY_GOAL_HOURS,
        ) => {
          if (cumulativeWeeklyHours >= FULL_TIME_WEEKLY_HOURS) return "S25";
          if (cumulativeRegularScopeHours >= regularThreshold) {
            return isNightShift(date) && !isSundayOrHoliday(date) ? "S50" : "S15";
          }
          return "ORD";
        };

        const calculateBreakdown = (
          startMs,
          endMs,
          regularScopeHoursBefore = 0,
          weeklyHoursBefore = regularScopeHoursBefore,
          regularThreshold = WEEKLY_GOAL_HOURS,
        ) => {
          let base = 0;
          let nightWeekdayExtra = 0;
          let nightSundayHolidayExtra = 0;
          let nightWeekdayHours = 0;
          let nightSundayHolidayHours = 0;
          const payCodeTotals = {
            ORD: 0,
            S15: 0,
            S25: 0,
            S50: 0,
          };
          const step = 60000;
          const elapsed = endMs - startMs;
          const unpaidBreakMs = elapsed >= UNPAID_BREAK_THRESHOLD ? UNPAID_BREAK_DURATION : 0;
          const payableEndMs = Math.max(startMs, endMs - unpaidBreakMs);
          let curr = startMs;

          while (curr < payableEndMs) {
            const next = Math.min(curr + step, payableEndMs);
            const hours = (next - curr) / 3600000;
            const d = new Date(curr);
            const paidHoursSoFar = (curr - startMs) / 3600000;
            const payCode = getAutomaticPayCode(
              d,
              regularScopeHoursBefore + paidHoursSoFar,
              weeklyHoursBefore + paidHoursSoFar,
              regularThreshold,
            );
            const payCodeDetails = getPayCode(payCode);
            payCodeTotals[payCode] += hours;
            base += hours * BASE_RATE * payCodeDetails.multiplier;
            if (isNightShift(d) && isSundayOrHoliday(d)) {
              nightSundayHolidayExtra += hours * (BASE_RATE * NIGHT_SUNDAY_HOLIDAY_BONUS_FRACTION);
              nightSundayHolidayHours += hours;
            } else if (isNightShift(d) && payCode !== "S50") {
              nightWeekdayExtra += hours * (BASE_RATE * NIGHT_WEEKDAY_BONUS_FRACTION);
              nightWeekdayHours += hours;
            }
            curr = next;
          }

          const mealVoucher = elapsed >= MEAL_VOUCHER_THRESHOLD ? MEAL_VOUCHER_AMOUNT : 0;
          const paidElapsed = Math.max(0, elapsed - unpaidBreakMs);
          const nightExtra = nightWeekdayExtra + nightSundayHolidayExtra;
          const total = base + nightExtra;
          return {
            total,
            base,
            payCodeTotals,
            nightExtra,
            nightWeekdayExtra,
            nightSundayHolidayExtra,
            nightWeekdayHours,
            nightSundayHolidayHours,
            mealVoucher,
            elapsed,
            paidElapsed,
            unpaidBreakMs,
          };
        };

        const calculatePayslipNetEstimate = ({
          payCodeTotals,
          nightWeekdayHours,
          nightSundayHolidayHours,
          workedDays,
          parkingDeduction,
        }) => {
          if (workedDays === 0) {
            return {
              net: 0,
              netPlusVouchers: 0,
              grossPayroll: 0,
              totalCredits: 0,
              totalDeductions: 0,
              irpefTaxable: 0,
              substituteTaxable: 0,
            };
          }

          const regularPay = roundCurrency(payCodeTotals.ORD * PAYSLIP_REGULAR_HOURLY_RATE);
          const s15Pay = roundCurrency(payCodeTotals.S15 * PAYSLIP_S15_RATE);
          const s50Pay = roundCurrency(payCodeTotals.S50 * PAYSLIP_S50_RATE);
          const s25Pay = roundCurrency(payCodeTotals.S25 * PAYSLIP_S25_RATE);
          const nttPay = roundCurrency(nightWeekdayHours * PAYSLIP_NTT_RATE);
          const ntdPay = roundCurrency(nightSundayHolidayHours * PAYSLIP_NTD_RATE);
          const shiftAllowance = roundCurrency(workedDays * PAYSLIP_SHIFT_ALLOWANCE_RATE);
          const dailyTurnistaAllowance = roundCurrency(workedDays * PAYSLIP_DAILY_TURNISTA_RATE);
          const campoAllowance = roundCurrency(workedDays * PAYSLIP_CAMPO_RATE);
          const variablePay = roundCurrency(
            shiftAllowance + dailyTurnistaAllowance + campoAllowance + s15Pay + s50Pay + s25Pay + nttPay + ntdPay,
          );
          const grossPayroll = roundCurrency(regularPay + variablePay);
          const contributionBase = Math.floor(grossPayroll);
          const fondoTrasporto = roundCurrency(contributionBase * PAYSLIP_FONDO_TRASPORTO_RATE);
          const ivs = roundCurrency(contributionBase * PAYSLIP_IVS_RATE);
          const fis = roundCurrency(contributionBase * PAYSLIP_FIS_RATE);
          const cigs = roundCurrency(contributionBase * PAYSLIP_CIGS_RATE);
          const substituteTaxable = roundCurrency(variablePay * PAYSLIP_SUBSTITUTE_TAXABLE_VARIABLE_FRACTION);
          const substituteTax = roundCurrency(substituteTaxable * PAYSLIP_SUBSTITUTE_TAX_RATE);
          const irpefTaxable = roundCurrency(grossPayroll - fondoTrasporto - ivs - fis - cigs - substituteTaxable);
          const irpefGross = roundCurrency(irpefTaxable * PAYSLIP_IRPEF_RATE);
          const irpefWithheld = Math.max(0, roundCurrency(irpefGross - PAYSLIP_EMPLOYEE_DEDUCTION));
          const totalCredits = roundCurrency(PAYSLIP_TRATTAMENTO_INTEGRATIVO + PAYSLIP_L207_INDEMNITY);
          const totalDeductions = roundCurrency(
            parkingDeduction + fondoTrasporto + ivs + fis + cigs + substituteTax + irpefWithheld,
          );
          const net = roundCurrency(grossPayroll + totalCredits - totalDeductions + PAYSLIP_ROUNDING);

          return {
            net,
            grossPayroll,
            regularPay,
            variablePay,
            totalCredits,
            totalDeductions,
            irpefTaxable,
            substituteTaxable,
            irpefWithheld,
            substituteTax,
            socialContributions: roundCurrency(fondoTrasporto + ivs + fis + cigs),
          };
        };

        const getSessionAutoEnd = (startMs, timeValue) => {
          if (!timeValue) return null;
          const startDate = new Date(startMs);
          const dateValue = formatDateInput(startDate);
          const { end } = getShiftRange(dateValue, formatTimeInput(startDate), timeValue);
          return end.getTime();
        };

        const startSession = async () => {
          if (!user) return;
          const today = formatDateInput(new Date());
          const latched = buildDateTime(today, selectedStartTime);

          await saveState({
            session: { startTime: latched.getTime(), active: true, autoEndTime: null },
            weeklyStats,
          });
        };

        const endSession = async (forcedEndMs = null) => {
          if (!user || !activeTrackSession) return;
          const endMs = forcedEndMs ?? currentTime.getTime();
          const prefill = activeTrackSession.prefillDate
            ? calculateStoredDayPrefill(activeTrackSession.prefillDate, activeTrackSession.startTime, weeklyStats.totalHours)
            : { aggregate: createEmptyBreakdown(), paidHoursBefore: 0 };
          const breakdown = calculateBreakdown(
            activeTrackSession.startTime,
            endMs,
            weeklyStats.totalHours + prefill.paidHoursBefore,

            nightWeekdayExtra,

              shift,
              monthlyPaidHoursBefore,
              weeklyHoursByKey[weekKey] || 0,
              MONTHLY_ORDINARY_HOURS,
            );

            monthlyPaidHoursBefore += breakdown.paidElapsed / 3600000;
