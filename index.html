    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useMemo, useState } = React;

      const firebaseConfig =
        typeof window.__firebase_config !== "undefined"
          ? JSON.parse(window.__firebase_config)
          : null;
      const appId =
        typeof window.__app_id !== "undefined"
          ? window.__app_id
          : "earnings-tracker-it";

      const BASE_RATE = 6.24925;
      const SUPPLEMENTAL_15_MULTIPLIER = 1.15;
      const OVERTIME_25_MULTIPLIER = 1.25;
      const SUPPLEMENTAL_50_MULTIPLIER = 1.5;
      const NIGHT_WEEKDAY_BONUS_FRACTION = 0.5;
      const NIGHT_SUNDAY_HOLIDAY_BONUS_FRACTION = 0.55;
      const MEAL_VOUCHER_AMOUNT = 8.0;
      const MEAL_VOUCHER_THRESHOLD = 6 * 3600000;
      const UNPAID_BREAK_THRESHOLD = 7 * 3600000;
      const UNPAID_BREAK_DURATION = 30 * 60000;
      const WEEKLY_GOAL_HOURS = 30;
      const FULL_TIME_WEEKLY_HOURS = 38.5;
      const MONTHLY_ORDINARY_HOURS = 130;
      const MONTHLY_PARKING_DEDUCTION = 46.0;
      const PAYSLIP_REGULAR_HOURLY_RATE = 920.77 / MONTHLY_ORDINARY_HOURS;
      const PAYSLIP_S15_RATE = 7.18664;
      const PAYSLIP_S50_RATE = 9.37387;
      const PAYSLIP_S25_RATE = 7.81156;
      const PAYSLIP_NTT_RATE = 3.12462;
      const PAYSLIP_NTD_RATE = 3.43709;
      const PAYSLIP_SHIFT_ALLOWANCE_RATE = 0.20259;
      const PAYSLIP_DAILY_TURNISTA_RATE = 3.30381;
      const PAYSLIP_CAMPO_RATE = 0.20259;
      const PAYSLIP_FONDO_TRASPORTO_RATE = 0.0016667;
      const PAYSLIP_IVS_RATE = 0.0919;
      const PAYSLIP_FIS_RATE = 0.0027;
      const PAYSLIP_CIGS_RATE = 0.003;
      const PAYSLIP_SUBSTITUTE_TAXABLE_VARIABLE_FRACTION = 0.463;
      const PAYSLIP_SUBSTITUTE_TAX_RATE = 0.15;
      const PAYSLIP_IRPEF_RATE = 0.23;
      const PAYSLIP_EMPLOYEE_DEDUCTION = 117.21;
      const PAYSLIP_TRATTAMENTO_INTEGRATIVO = 101.91;
      const PAYSLIP_L207_INDEMNITY = 53.15;
      const PAYSLIP_ROUNDING = 0.44;
      const STORAGE_KEY = `earnings-tracker:${appId}:main`;
      const PAY_CODES = {
        ORD: { label: "Regular hours", multiplier: 1 },
        S15: { label: "Extra day hours after 30h", multiplier: SUPPLEMENTAL_15_MULTIPLIER },
        S25: { label: "Overtime after 38.5h", multiplier: OVERTIME_25_MULTIPLIER },
        S50: { label: "Extra night weekday hours", multiplier: SUPPLEMENTAL_50_MULTIPLIER },
      };

      const ITALIAN_HOLIDAYS = {
        "01-01": "Capodanno",
        "01-06": "Epifania",
        "04-25": "Liberazione",
        "05-01": "Lavoro",
        "06-02": "Repubblica",
        "08-15": "Ferragosto",
        "11-01": "Ognissanti",
        "12-08": "Immacolata",
        "12-25": "Natale",
        "12-26": "S. Stefano",
        "2026-04-05": "Pasqua",
        "2026-04-06": "Lunedi dell'Angelo",
        "2027-03-28": "Pasqua",
        "2027-03-29": "Lunedi dell'Angelo",
      };

      const buildSeedShifts = (rows) =>
        rows.map(([date, startTime, endTime, note]) => ({
          id: `seed-${date}-${startTime}`,
          date,
          startTime,
          endTime,
          note,
        }));

      const MARCH_2026_SHIFTS = buildSeedShifts([
        ["2026-03-01", "09:00", "17:00", "Work induction"],
        ["2026-03-02", "17:00", "23:00", "617"],

        ["2026-03-04", "12:00", "18:00", "617"],
        ["2026-03-06", "09:00", "14:00", "511"],
        ["2026-03-07", "07:00", "15:00", "607"],
        ["2026-03-08", "07:00", "13:00", "607"],
        ["2026-03-09", "08:00", "16:00", "509"],
        ["2026-03-10", "08:00", "13:00", "509"],
        ["2026-03-13", "08:00", "16:00", "515"],
        ["2026-03-14", "10:00", "18:00", "515"],
        ["2026-03-15", "11:00", "16:00", "515"],
        ["2026-03-16", "08:00", "16:00", "515"],
        ["2026-03-18", "03:00", "11:00", "647"],
        ["2026-03-19", "03:00", "11:00", "647"],
        ["2026-03-20", "03:00", "11:00", "647"],
        ["2026-03-22", "06:00", "11:00", "505"],
        ["2026-03-23", "06:00", "14:00", "503"],
        ["2026-03-24", "05:00", "13:00", "503"],
        ["2026-03-25", "05:00", "13:00", "503"],
        ["2026-03-27", "13:00", "18:00", "519"],
        ["2026-03-28", "09:00", "17:00", "519"],
        ["2026-03-29", "13:00", "18:00", "519"],
        ["2026-03-30", "16:00", "22:00", "619"],
      ]);

      const APRIL_2026_SHIFTS = buildSeedShifts([
        ["2026-04-02", "05:00", "13:00", "503"],
        ["2026-04-03", "09:00", "17:00", "503"],
        ["2026-04-04", "05:00", "10:00", "503"],
        ["2026-04-05", "05:00", "10:00", "503 Pasqua"],
        ["2026-04-06", "05:00", "10:00", "503 Lunedi dell'Angelo"],
        ["2026-04-08", "08:00", "16:00", "613"],
        ["2026-04-09", "08:00", "16:00", "613"],
        ["2026-04-10", "09:00", "17:00", "613"],
        ["2026-04-11", "08:00", "16:00", "613"],
        ["2026-04-12", "10:00", "16:00", "613"],
        ["2026-04-14", "15:00", "23:00", "529"],
        ["2026-04-15", "18:00", "02:00", "529"],
        ["2026-04-16", "18:00", "23:00", "529"],
        ["2026-04-17", "17:00", "22:00", "527"],
        ["2026-04-18", "17:00", "22:00", "527"],
        ["2026-04-20", "10:00", "15:00", "513"],
        ["2026-04-21", "10:00", "15:00", "513"],
        ["2026-04-22", "10:00", "15:00", "513"],
        ["2026-04-24", "10:00", "15:00", "513"],
        ["2026-04-25", "10:00", "15:00", "513 Liberazione"],
        ["2026-04-26", "17:00", "22:00", "527"],
        ["2026-04-27", "17:00", "22:00", "527"],
        ["2026-04-28", "17:00", "22:00", "527"],
        ["2026-04-29", "17:00", "22:00", "527"],
      ]);

      const SEEDED_MONTHS = {
        "2026-03": { label: "March 2026 payslip", shifts: MARCH_2026_SHIFTS },
        "2026-04": { label: "April 2026 plan", shifts: APRIL_2026_SHIFTS },
      };
      const DEFAULT_CALENDAR_SHIFTS = [...MARCH_2026_SHIFTS, ...APRIL_2026_SHIFTS];

      function readLocalState() {
        const fallback = { session: null, weeklyStats: { totalHours: 0, totalEarned: 0 }, calendarShifts: DEFAULT_CALENDAR_SHIFTS };

        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
          if (!saved) return fallback;
          return {
            ...fallback,
            ...saved,
            calendarShifts:
              Array.isArray(saved.calendarShifts) && saved.calendarShifts.length > 0
                ? saved.calendarShifts
                : DEFAULT_CALENDAR_SHIFTS,
          };
        } catch {
          return fallback;
        }
      }

      function writeLocalState(nextState) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(nextState));
        window.dispatchEvent(new Event("earnings-tracker:storage"));
      }

      function roundToHalfHour(date) {
        const rounded = new Date(date);
        rounded.setMinutes(Math.round(rounded.getMinutes() / 30) * 30);
        rounded.setSeconds(0);
        rounded.setMilliseconds(0);
        return rounded;
      }

      function formatDateInput(date) {
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(
          date.getDate(),
        ).padStart(2, "0")}`;
      }

      function formatMonthInput(date) {
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
      }

      function formatTimeInput(date) {
        return `${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
      }

      function buildDateTime(dateValue, timeValue) {
        const [year, month, day] = dateValue.split("-").map(Number);
        const [hours, minutes] = timeValue.split(":").map(Number);
        return new Date(year, month - 1, day, hours, minutes, 0, 0);
      }

      const TIME_OPTIONS = Array.from({ length: 48 }, (_, index) => {
        const hours = Math.floor(index / 2);
        const minutes = index % 2 === 0 ? "00" : "30";
        return `${String(hours).padStart(2, "0")}:${minutes}`;
      });
      const WEEKDAY_LABELS = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
      const MONTH_OPTIONS = [
        "January",
        "February",
        "March",
        "April",
        "May",
        "June",
        "July",
        "August",
        "September",
        "October",
        "November",
        "December",
      ];
      const currentYear = new Date().getFullYear();
      const YEAR_OPTIONS = Array.from({ length: 5 }, (_, index) => currentYear - 2 + index);
      const roundCurrency = (amount) => Math.round((amount + Number.EPSILON) * 100) / 100;

      function App() {
        const [user, setUser] = useState(null);
        const [session, setSession] = useState(null);
        const [weeklyStats, setWeeklyStats] = useState({ totalHours: 0, totalEarned: 0 });
        const [mode, setMode] = useState("track");
        const [selectedStartTime, setSelectedStartTime] = useState(() => formatTimeInput(roundToHalfHour(new Date())));
        const [predictionDate, setPredictionDate] = useState(() => formatDateInput(new Date()));
        const [predictionStartTime, setPredictionStartTime] = useState(() => formatTimeInput(roundToHalfHour(new Date())));
        const [predictionEndTime, setPredictionEndTime] = useState(() =>
          formatTimeInput(new Date(roundToHalfHour(new Date()).getTime() + 6 * 3600000)),
        );
        const [calendarShifts, setCalendarShifts] = useState([]);
        const [calendarMonth, setCalendarMonth] = useState(() => formatMonthInput(new Date()));
        const [calendarDate, setCalendarDate] = useState(() => formatDateInput(new Date()));
        const [calendarStartTime, setCalendarStartTime] = useState("08:00");
        const [calendarEndTime, setCalendarEndTime] = useState("14:00");
        const [editingCalendarShiftId, setEditingCalendarShiftId] = useState(null);
        const [currentTime, setCurrentTime] = useState(new Date());
        const [loading, setLoading] = useState(true);
        const [services, setServices] = useState(null);
        const isLocalMode = !firebaseConfig;

        useEffect(() => {
          if (!firebaseConfig) {
            setUser({ uid: "local-user" });
            setLoading(false);
            return;
          }

          const firebaseApp = firebase.initializeApp(firebaseConfig);
          const auth = firebase.auth(firebaseApp);
          const db = firebase.firestore(firebaseApp);
          setServices({ auth, db });

          const initAuth = async () => {
            try {
              if (
                typeof window.__initial_auth_token !== "undefined" &&
                window.__initial_auth_token
              ) {
                await auth.signInWithCustomToken(window.__initial_auth_token);
              } else {
                await auth.signInAnonymously();
              }
            } catch (err) {
              console.error("Auth error", err);
            }
          };

          initAuth();
          return auth.onAuthStateChanged((nextUser) => {
            setUser(nextUser);
            setLoading(false);
          });
        }, []);

        useEffect(() => {
          if (!user) return undefined;

          if (isLocalMode) {
            const syncLocalState = () => {
              const data = readLocalState();
              setSession(data.session || null);
              setWeeklyStats(data.weeklyStats || { totalHours: 0, totalEarned: 0 });
              setCalendarShifts(data.calendarShifts || []);
            };

            syncLocalState();
            window.addEventListener("earnings-tracker:storage", syncLocalState);
            return () => window.removeEventListener("earnings-tracker:storage", syncLocalState);
          }

          if (!services) return undefined;

          const userDocRef = services.db
            .collection("artifacts")
            .doc(appId)
            .collection("users")
            .doc(user.uid)
            .collection("settings")
            .doc("main");

          return userDocRef.onSnapshot((snap) => {
            if (snap.exists) {
              const data = snap.data();
              setSession(data.session || null);
              setWeeklyStats(data.weeklyStats || { totalHours: 0, totalEarned: 0 });
              setCalendarShifts(data.calendarShifts || []);
            }
          });
        }, [isLocalMode, services, user]);

        useEffect(() => {
          const timer = setInterval(() => setCurrentTime(new Date()), 100);
          return () => clearInterval(timer);
        }, []);

        const saveState = async (nextState) => {
          if (!user) return;

          if (isLocalMode) {
            writeLocalState({ session, weeklyStats, calendarShifts, ...nextState });
            return;
          }

          const userDocRef = services.db
            .collection("artifacts")
            .doc(appId)
            .collection("users")
            .doc(user.uid)
            .collection("settings")
            .doc("main");

          await userDocRef.set(nextState, { merge: true });
        };

        const isNightShift = (date) => {
          const hours = date.getHours();
          return hours >= 20 || hours < 8;
        };

        const isSunday = (date) => date.getDay() === 0;

        const getHoliday = (date) => {
          const monthDay = `${String(date.getMonth() + 1).padStart(2, "0")}-${String(
            date.getDate(),
          ).padStart(2, "0")}`;
          return ITALIAN_HOLIDAYS[monthDay] || ITALIAN_HOLIDAYS[`${date.getFullYear()}-${monthDay}`] || null;
        };

        const isSundayOrHoliday = (date) => isSunday(date) || Boolean(getHoliday(date));

        const getPayCode = (payCode) => PAY_CODES[payCode] || PAY_CODES.ORD;

        const getAutomaticPayCode = (
          date,
          cumulativeRegularScopeHours,
          cumulativeWeeklyHours = cumulativeRegularScopeHours,
          regularThreshold = WEEKLY_GOAL_HOURS,
        ) => {
          if (cumulativeWeeklyHours >= FULL_TIME_WEEKLY_HOURS) return "S25";
          if (cumulativeRegularScopeHours >= regularThreshold) {
            return isNightShift(date) && !isSundayOrHoliday(date) ? "S50" : "S15";
          }
          return "ORD";
        };

        const calculateBreakdown = (
          startMs,
          endMs,
          regularScopeHoursBefore = 0,
          weeklyHoursBefore = regularScopeHoursBefore,
          regularThreshold = WEEKLY_GOAL_HOURS,
        ) => {
          let base = 0;
          let nightWeekdayExtra = 0;
          let nightSundayHolidayExtra = 0;
          let nightWeekdayHours = 0;
          let nightSundayHolidayHours = 0;
          const payCodeTotals = {
            ORD: 0,
            S15: 0,
            S25: 0,
            S50: 0,
          };
          const step = 60000;
          const elapsed = endMs - startMs;
          const unpaidBreakMs = elapsed >= UNPAID_BREAK_THRESHOLD ? UNPAID_BREAK_DURATION : 0;
          const payableEndMs = Math.max(startMs, endMs - unpaidBreakMs);
          let curr = startMs;

          while (curr < payableEndMs) {
            const next = Math.min(curr + step, payableEndMs);
            const hours = (next - curr) / 3600000;
            const d = new Date(curr);
            const paidHoursSoFar = (curr - startMs) / 3600000;
            const payCode = getAutomaticPayCode(
              d,
              regularScopeHoursBefore + paidHoursSoFar,
              weeklyHoursBefore + paidHoursSoFar,
              regularThreshold,
            );
            const payCodeDetails = getPayCode(payCode);
            payCodeTotals[payCode] += hours;
            base += hours * BASE_RATE * payCodeDetails.multiplier;
            if (isNightShift(d) && isSundayOrHoliday(d)) {
              nightSundayHolidayExtra += hours * (BASE_RATE * NIGHT_SUNDAY_HOLIDAY_BONUS_FRACTION);
              nightSundayHolidayHours += hours;
            } else if (isNightShift(d) && payCode !== "S50") {
              nightWeekdayExtra += hours * (BASE_RATE * NIGHT_WEEKDAY_BONUS_FRACTION);
              nightWeekdayHours += hours;
            }
            curr = next;
          }

          const mealVoucher = elapsed >= MEAL_VOUCHER_THRESHOLD ? MEAL_VOUCHER_AMOUNT : 0;
          const paidElapsed = Math.max(0, elapsed - unpaidBreakMs);
          const nightExtra = nightWeekdayExtra + nightSundayHolidayExtra;
          const total = base + nightExtra;
          return {
            total,
            base,
            payCodeTotals,
            nightExtra,
            nightWeekdayExtra,
            nightSundayHolidayExtra,
            nightWeekdayHours,
            nightSundayHolidayHours,
            mealVoucher,
            elapsed,
            paidElapsed,
            unpaidBreakMs,
          };
        };

        const calculatePayslipNetEstimate = ({
          payCodeTotals,
          nightWeekdayHours,
          nightSundayHolidayHours,
          workedDays,
          parkingDeduction,
        }) => {
          if (workedDays === 0) {
            return {
              net: 0,
              netPlusVouchers: 0,
              grossPayroll: 0,
              totalCredits: 0,
              totalDeductions: 0,
              irpefTaxable: 0,
              substituteTaxable: 0,
            };
          }

          const regularPay = roundCurrency(payCodeTotals.ORD * PAYSLIP_REGULAR_HOURLY_RATE);
          const s15Pay = roundCurrency(payCodeTotals.S15 * PAYSLIP_S15_RATE);
          const s50Pay = roundCurrency(payCodeTotals.S50 * PAYSLIP_S50_RATE);
          const s25Pay = roundCurrency(payCodeTotals.S25 * PAYSLIP_S25_RATE);
          const nttPay = roundCurrency(nightWeekdayHours * PAYSLIP_NTT_RATE);
          const ntdPay = roundCurrency(nightSundayHolidayHours * PAYSLIP_NTD_RATE);
          const shiftAllowance = roundCurrency(workedDays * PAYSLIP_SHIFT_ALLOWANCE_RATE);
          const dailyTurnistaAllowance = roundCurrency(workedDays * PAYSLIP_DAILY_TURNISTA_RATE);
          const campoAllowance = roundCurrency(workedDays * PAYSLIP_CAMPO_RATE);
          const variablePay = roundCurrency(
            shiftAllowance + dailyTurnistaAllowance + campoAllowance + s15Pay + s50Pay + s25Pay + nttPay + ntdPay,
          );
          const grossPayroll = roundCurrency(regularPay + variablePay);
          const contributionBase = Math.floor(grossPayroll);
          const fondoTrasporto = roundCurrency(contributionBase * PAYSLIP_FONDO_TRASPORTO_RATE);
          const ivs = roundCurrency(contributionBase * PAYSLIP_IVS_RATE);
          const fis = roundCurrency(contributionBase * PAYSLIP_FIS_RATE);
          const cigs = roundCurrency(contributionBase * PAYSLIP_CIGS_RATE);
          const substituteTaxable = roundCurrency(variablePay * PAYSLIP_SUBSTITUTE_TAXABLE_VARIABLE_FRACTION);
          const substituteTax = roundCurrency(substituteTaxable * PAYSLIP_SUBSTITUTE_TAX_RATE);
          const irpefTaxable = roundCurrency(grossPayroll - fondoTrasporto - ivs - fis - cigs - substituteTaxable);
          const irpefGross = roundCurrency(irpefTaxable * PAYSLIP_IRPEF_RATE);
          const irpefWithheld = Math.max(0, roundCurrency(irpefGross - PAYSLIP_EMPLOYEE_DEDUCTION));
          const totalCredits = roundCurrency(PAYSLIP_TRATTAMENTO_INTEGRATIVO + PAYSLIP_L207_INDEMNITY);
          const totalDeductions = roundCurrency(
            parkingDeduction + fondoTrasporto + ivs + fis + cigs + substituteTax + irpefWithheld,
          );
          const net = roundCurrency(grossPayroll + totalCredits - totalDeductions + PAYSLIP_ROUNDING);

          return {
            net,
            grossPayroll,
            regularPay,
            variablePay,
            totalCredits,
            totalDeductions,
            irpefTaxable,
            substituteTaxable,
            irpefWithheld,
            substituteTax,
            socialContributions: roundCurrency(fondoTrasporto + ivs + fis + cigs),
          };
        };

        const startSession = async () => {
          if (!user) return;
          const today = formatDateInput(new Date());
          const latched = buildDateTime(today, selectedStartTime);

          await saveState({
            session: { startTime: latched.getTime(), active: true },
            weeklyStats,
          });
        };

        const endSession = async () => {
          if (!user || !session) return;
          const breakdown = calculateBreakdown(
            session.startTime,
            currentTime.getTime(),
            weeklyStats.totalHours,
          );
          const updatedStats = {
            totalHours: weeklyStats.totalHours + breakdown.paidElapsed / 3600000,
            totalEarned: weeklyStats.totalEarned + breakdown.total,
          };

          await saveState({
            session: null,
            weeklyStats: updatedStats,
          });
        };

        const adjustStart = async (mins) => {
          if (!user || !session) return;
          const newStart = session.startTime + mins * 60000;
          await saveState({
            session: { ...session, startTime: newStart },
          });
        };

        const getShiftRange = (dateValue, startValue, endValue) => {
          const start = buildDateTime(dateValue, startValue);
          let end = buildDateTime(dateValue, endValue);
          if (end <= start) end = new Date(end.getTime() + 24 * 3600000);
          return { start, end };
        };

        const getWeekKey = (dateValue) => {
          const date = buildDateTime(dateValue, "00:00");
          const monday = new Date(date);
          const dayOffset = (monday.getDay() + 6) % 7;
          monday.setDate(monday.getDate() - dayOffset);
          return formatDateInput(monday);
        };

        const saveCalendarShift = async () => {
          if (!user) return;
          const nextShift = {
            id: editingCalendarShiftId || `${Date.now()}`,
            date: calendarDate,
            startTime: calendarStartTime,
            endTime: calendarEndTime,
          };
          const nextShifts = editingCalendarShiftId
            ? calendarShifts.map((shift) => (shift.id === editingCalendarShiftId ? nextShift : shift))
            : [...calendarShifts, nextShift];

          setCalendarShifts(nextShifts);
          setEditingCalendarShiftId(null);
          await saveState({ calendarShifts: nextShifts });
        };

        const editCalendarShift = (shift) => {
          setEditingCalendarShiftId(shift.id);
          setCalendarDate(shift.date);
          setCalendarMonth(shift.date.slice(0, 7));
          setCalendarStartTime(shift.startTime);
          setCalendarEndTime(shift.endTime);
        };

        const deleteCalendarShift = async (shiftId) => {
          const nextShifts = calendarShifts.filter((shift) => shift.id !== shiftId);
          setCalendarShifts(nextShifts);
          if (editingCalendarShiftId === shiftId) setEditingCalendarShiftId(null);
          await saveState({ calendarShifts: nextShifts });

        const loadSeededMonth = async (monthKey) => {
          const seed = SEEDED_MONTHS[monthKey];
          if (!seed) return;

          const nextShifts = [
            ...calendarShifts.filter((shift) => !shift.date.startsWith(monthKey)),
            ...seed.shifts,
          ].sort((a, b) => `${a.date} ${a.startTime}`.localeCompare(`${b.date} ${b.startTime}`));

          setCalendarMonth(monthKey);
          setCalendarDate(`${monthKey}-01`);
          setCalendarShifts(nextShifts);
          setEditingCalendarShiftId(null);
          await saveState({ calendarShifts: nextShifts });
        };

        const updateCalendarMonth = (nextYear, nextMonth) => {
          const nextValue = `${nextYear}-${String(nextMonth).padStart(2, "0")}`;
          setCalendarMonth(nextValue);
          if (!calendarDate.startsWith(nextValue)) {
            setCalendarDate(`${nextValue}-01`);

          const dayShifts = calendarShifts
            .filter((shift) => shift.date === dateValue)

          setCalendarDate(dateValue);
          setCalendarMonth(dateValue.slice(0, 7));
          if (dayShifts.length > 0) {
            editCalendarShift(dayShifts[0]);

        const currentBreakdown = useMemo(
          () =>
            session

                  session.startTime,
                  currentTime.getTime(),
                  weeklyStats.totalHours,

              : null,
          [currentTime, session, weeklyStats.totalHours],

        const predictionBreakdown = useMemo(() => {
          const { start, end } = getShiftRange(predictionDate, predictionStartTime, predictionEndTime);
          return calculateBreakdown(start.getTime(), end.getTime(), weeklyStats.totalHours);

        const monthlyShifts = useMemo(

        const calendarDays = useMemo(() => {
          const [year, month] = calendarMonth.split("-").map(Number);
          const firstDay = new Date(year, month - 1, 1);
          const startOffset = (firstDay.getDay() + 6) % 7;
          const gridStart = new Date(firstDay);
          gridStart.setDate(firstDay.getDate() - startOffset);

          return Array.from({ length: 42 }, (_, index) => {
            const date = new Date(gridStart);
            date.setDate(gridStart.getDate() + index);
            const dateValue = formatDateInput(date);
            const shifts = calendarShifts
              .filter((shift) => shift.date === dateValue)
              .sort((a, b) => a.startTime.localeCompare(b.startTime));
            const summary = shifts.reduce(
              (acc, shift) => {
                const { start, end } = getShiftRange(shift.date, shift.startTime, shift.endTime);
                const breakdown = calculateBreakdown(start.getTime(), end.getTime(), 0);
                acc.total += breakdown.total + breakdown.mealVoucher;
                acc.displayHours += breakdown.elapsed / 3600000;
                return acc;
              },
              { total: 0, displayHours: 0 },

            return {
              date,
              dateValue,
              inMonth: dateValue.startsWith(calendarMonth),
              shifts,
              total: summary.total,
              displayHours: summary.displayHours,
            };

          const weeklyHoursByKey = {};
          const payCodeTotals = { ORD: 0, S15: 0, S25: 0, S50: 0 };
          let total = 0;
          let monthlyPaidHoursBefore = 0;
          let paidElapsed = 0;
          let elapsed = 0;
          let nightWeekdayExtra = 0;
          let nightSundayHolidayExtra = 0;
          let nightWeekdayHours = 0;
          let nightSundayHolidayHours = 0;
          let unpaidBreakMs = 0;
          let foodVouchers = 0;
          const workedDays = new Set(monthlyShifts.map((shift) => shift.date)).size;

          for (const shift of monthlyShifts) {
            const weekKey = getWeekKey(shift.date);
            const { start, end } = getShiftRange(shift.date, shift.startTime, shift.endTime);
            const breakdown = calculateBreakdown(
              start.getTime(),
              end.getTime(),
              monthlyPaidHoursBefore,
              weeklyHoursByKey[weekKey] || 0,
              MONTHLY_ORDINARY_HOURS,

            monthlyPaidHoursBefore += breakdown.paidElapsed / 3600000;
            weeklyHoursByKey[weekKey] = (weeklyHoursByKey[weekKey] || 0) + breakdown.paidElapsed / 3600000;
            total += breakdown.total;
            paidElapsed += breakdown.paidElapsed;
            elapsed += breakdown.elapsed;
            nightWeekdayExtra += breakdown.nightWeekdayExtra;
            nightSundayHolidayExtra += breakdown.nightSundayHolidayExtra;
            nightWeekdayHours += breakdown.nightWeekdayHours;
            nightSundayHolidayHours += breakdown.nightSundayHolidayHours;
            unpaidBreakMs += breakdown.unpaidBreakMs;
            foodVouchers += breakdown.mealVoucher;

            nightWeekdayHours,
            nightSundayHolidayHours,
            workedDays,
            parkingDeduction,

          const totalWithVouchers = payslipNetEstimate.net + foodVouchers;
          return {

            incomeAfterParking,
            earningsTotal,
            parkingDeduction,
            foodVouchers,
            payslipNetEstimate,
            paidElapsed,
            elapsed,
            nightWeekdayExtra,
            nightSundayHolidayExtra,
            nightWeekdayHours,
            nightSundayHolidayHours,
            unpaidBreakMs,

                                  })}
                                </div>
                                <p className="text-[10px] font-bold uppercase tracking-widest text-emerald-300 mt-2">
                                  Net + vouchers: EUR {monthlyPrediction.total.toFixed(2)}
                                </p>
                              </div>
                              <div className="text-right text-[10px] font-black uppercase tracking-widest text-zinc-500">
                                {(monthlyPrediction.paidElapsed / 3600000).toFixed(1)} paid h
                              </div>
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-5 gap-3 mb-4">
                              <div className="bg-white/5 rounded p-3">
                                <p className="text-[9px] font-black uppercase tracking-widest text-zinc-500 mb-1">
                                  Shift earnings
                                </p>
                                <p className="text-sm font-black text-white">
                                  EUR {monthlyPrediction.earningsTotal.toFixed(2)}
                                </p>
                              </div>
                              <div className="bg-red-500/10 rounded p-3">
                                <p className="text-[9px] font-black uppercase tracking-widest text-red-200 mb-1">
                                  Parking
                                </p>
                                <p className="text-sm font-black text-red-100">
                                  -EUR {monthlyPrediction.parkingDeduction.toFixed(2)}
                                </p>
                              </div>
                              <div className="bg-white/5 rounded p-3">
                                <p className="text-[9px] font-black uppercase tracking-widest text-zinc-500 mb-1">
                                  After parking
                                </p>
                                <p className="text-sm font-black text-white">
                                  EUR {monthlyPrediction.incomeAfterParking.toFixed(2)}
                                </p>
                              </div>
                              <div className="bg-sky-500/10 rounded p-3">
                                <p className="text-[9px] font-black uppercase tracking-widest text-sky-200 mb-1">
                                  Payroll gross
                                </p>
                                <p className="text-sm font-black text-sky-100">
                                  EUR {monthlyPrediction.payslipNetEstimate.grossPayroll.toFixed(2)}
                                </p>
                              </div>
                              <div className="bg-emerald-500/10 rounded p-3">
                                <p className="text-[9px] font-black uppercase tracking-widest text-emerald-200 mb-1">
                                  Food vouchers
                                </p>
                                <p className="text-sm font-black text-emerald-100">
                                  EUR {monthlyPrediction.foodVouchers.toFixed(2)}
                                </p>
                              </div>
                            </div>
                            <div className="flex flex-wrap gap-2">
                              {Object.entries(monthlyPrediction.payCodeTotals)
                                .filter(([, hours]) => hours > 0)
                                .map(([code, hours]) => (
                                  <span
                                    key={code}
                                    className="bg-yellow-500/10 border border-yellow-500/30 text-yellow-200 text-[9px] font-black px-2 py-1 rounded uppercase tracking-tight"
                                  >
                                    {getPayCode(code).label}: {hours.toFixed(2)}h
                                  </span>
                                ))}
                              {monthlyPrediction.nightWeekdayExtra > 0 && (
                                <span className="bg-sky-500/10 border border-sky-500/30 text-sky-200 text-[9px] font-black px-2 py-1 rounded uppercase tracking-tight">
                                  NTT: +EUR {monthlyPrediction.nightWeekdayExtra.toFixed(2)}
                                </span>
                              )}
                              {monthlyPrediction.nightSundayHolidayExtra > 0 && (
                                <span className="bg-emerald-500/10 border border-emerald-500/30 text-emerald-200 text-[9px] font-black px-2 py-1 rounded uppercase tracking-tight">
                                  NTD: +EUR {monthlyPrediction.nightSundayHolidayExtra.toFixed(2)}
                                </span>
                              )}
                              {monthlyPrediction.unpaidBreakMs > 0 && (
                                <span className="bg-red-500/10 border border-red-500/30 text-red-200 text-[9px] font-black px-2 py-1 rounded uppercase tracking-tight">
                                  Pausa pranzo: -{monthlyPrediction.unpaidBreakMs / 60000} min
                                </span>
                              )}
                              <span className="bg-sky-500/10 border border-sky-500/30 text-sky-200 text-[9px] font-black px-2 py-1 rounded uppercase tracking-tight">
                                Payroll deductions: -EUR {monthlyPrediction.payslipNetEstimate.totalDeductions.toFixed(2)}
                              </span>
                              <span className="bg-emerald-500/10 border border-emerald-500/30 text-emerald-200 text-[9px] font-black px-2 py-1 rounded uppercase tracking-tight">
                                Payroll credits: +EUR {monthlyPrediction.payslipNetEstimate.totalCredits.toFixed(2)}
                              </span>
                            </div>
                          </div>

                          <div className="space-y-2 text-left">
                            {monthlyShifts.length === 0 ? (
                              <p className="text-sm text-zinc-500 text-center py-4">No shifts saved for this month.</p>
                            ) : (
                              monthlyShifts.map((shift) => {
                                const { start, end } = getShiftRange(shift.date, shift.startTime, shift.endTime);
                                const shiftBreakdown = calculateBreakdown(start.getTime(), end.getTime(), 0);
                                return (
                                  <div
                                    key={shift.id}
                                    className="flex items-center justify-between gap-3 bg-black/30 border border-white/10 rounded p-3"
                                  >
                                    <div>
                                      <div className="text-sm font-black text-white">
                                        {shift.date} - {shift.startTime}-{shift.endTime}
                                      </div>
                                      {shift.note && (
                                        <div className="text-[10px] font-bold uppercase tracking-widest text-zinc-400">
                                          {shift.note}
                                        </div>
                                      )}
                                      <div className="text-[10px] font-bold uppercase tracking-widest text-zinc-500">
                                        EUR {shiftBreakdown.total.toFixed(2)} estimate
                                      </div>
                                    </div>
                                    <div className="flex gap-2">
                                      <button
                                        onClick={() => editCalendarShift(shift)}
                                        className="rounded border border-white/10 px-3 py-2 text-[10px] font-black uppercase tracking-widest text-zinc-300 hover:text-white"
                                      >
                                        Edit
                                      </button>
                                      <button
                                        onClick={() => deleteCalendarShift(shift.id)}
                                        className="rounded border border-red-500/30 px-3 py-2 text-[10px] font-black uppercase tracking-widest text-red-300 hover:text-red-100"
                                      >
                                        Delete
                                      </button>
                                    </div>
                                  </div>
                                );
                              })
                            )}
                          </div>
                        </div>
                      )}

                      <div className="flex justify-between text-xs font-bold text-zinc-500 uppercase tracking-widest">
                        <span>Weekly goal</span>
                        <span>
                          {weeklyStats.totalHours.toFixed(1)} / {WEEKLY_GOAL_HOURS}h
                        </span>
                      </div>
                      <div className="h-2 bg-white/5 rounded overflow-hidden">
                        <div
                          className="h-full bg-yellow-400 transition-all duration-1000"
                          style={{ width: `${progressPercent}%` }}
                        ></div>
                      </div>
                    </div>
                    {mode === "track" && (
                      <button
                        onClick={startSession}
                        className="w-full bg-white text-black py-5 rounded text-xl font-extrabold hover:bg-yellow-400 transition-all active:scale-[0.99] uppercase tracking-tight"
                      >
                        Inizia Ora
                      </button>
                    )}
                  </div>
                </section>
              ) : (
                <section className="flex flex-col items-center">
                  <div className="text-center mb-12 relative">
                    <div className="text-[4.5rem] sm:text-[6rem] md:text-[9.5rem] font-black tabular-nums leading-none tracking-tight mb-6 break-words">
                      EUR {currentBreakdown.total.toLocaleString("it-IT", {
                        minimumFractionDigits: 2,
                        maximumFractionDigits: 2,
                      })}
                    </div>
                    <div className="flex flex-wrap justify-center gap-3">
                      {Object.entries(currentBreakdown.payCodeTotals)
                        .filter(([, hours]) => hours > 0)
                        .map(([code, hours]) => (
                          <div
                            key={code}
                            className="bg-yellow-500/10 border border-yellow-500/30 text-yellow-200 text-[9px] font-black px-3 py-1 rounded uppercase tracking-tight"
                          >
                            {getPayCode(code).label}: {hours.toFixed(2)}h
                          </div>
                        ))}
                      {currentBreakdown.nightWeekdayExtra > 0 && (
                        <div className="bg-sky-500/10 border border-sky-500/30 text-sky-200 text-[9px] font-black px-3 py-1 rounded uppercase tracking-tight">
                          NTT (+50%): +EUR {currentBreakdown.nightWeekdayExtra.toFixed(2)}
                        </div>
                      )}
                      {currentBreakdown.nightSundayHolidayExtra > 0 && (
                        <div className="bg-emerald-500/10 border border-emerald-500/30 text-emerald-200 text-[9px] font-black px-3 py-1 rounded uppercase tracking-tight">
                          NTD (+55%): +EUR {currentBreakdown.nightSundayHolidayExtra.toFixed(2)}
                        </div>
                      )}
                      {currentBreakdown.mealVoucher > 0 && (
                        <div className="bg-emerald-500/10 border border-emerald-500/30 text-emerald-200 text-[9px] font-black px-3 py-1 rounded uppercase tracking-tight">
                          Food voucher: EUR {currentBreakdown.mealVoucher.toFixed(2)}
                        </div>
                      )}
                      {currentBreakdown.unpaidBreakMs > 0 && (
                        <div className="bg-red-500/10 border border-red-500/30 text-red-200 text-[9px] font-black px-3 py-1 rounded uppercase tracking-tight">
                          Pausa pranzo: -30 min
                        </div>
                      )}
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-4 gap-6 w-full mb-16">
                    <div className="bg-zinc-900/70 border border-white/10 p-6 rounded text-center">
                      <p className="text-[10px] font-bold text-zinc-500 uppercase mb-4 tracking-widest">
                        Start time
                      </p>
                      <div className="flex items-center justify-between px-2">
                        <button
                          onClick={() => adjustStart(-30)}
                          className="text-zinc-500 hover:text-white"
                          aria-label="Move start time back 30 minutes"
                        >
                          <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24">
                            <path d="m15 18-6-6 6-6" />
                          </svg>
                        </button>
                        <span className="text-2xl font-bold tabular-nums">
                          {new Date(session.startTime).toLocaleTimeString("it-IT", {
                            hour: "2-digit",
                            minute: "2-digit",
                          })}
                        </span>
                        <button
                          onClick={() => adjustStart(30)}
                          className="text-zinc-500 hover:text-white"
                          aria-label="Move start time forward 30 minutes"
                        >
                          <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24">
                            <path d="m9 18 6-6-6-6" />
                          </svg>
                        </button>
                      </div>
                    </div>
                    <div className="bg-zinc-900/70 border border-white/10 p-6 rounded text-center">
                      <p className="text-[10px] font-bold text-zinc-500 uppercase mb-4 tracking-widest">
                        Elapsed
                      </p>
                      <span className="text-2xl font-bold tabular-nums">
                        {Math.floor(currentBreakdown.elapsed / 3600000).toString().padStart(2, "0")}:
                        {Math.floor((currentBreakdown.elapsed % 3600000) / 60000)
                          .toString()
                          .padStart(2, "0")}
                        :
                        {Math.floor((currentBreakdown.elapsed % 60000) / 1000)
                          .toString()
                          .padStart(2, "0")}
                      </span>
                    </div>
                    <div className="bg-zinc-900/70 border border-white/10 p-6 rounded text-center">
                      <p className="text-[10px] font-bold text-zinc-500 uppercase mb-4 tracking-widest">
                        Paid time
                      </p>
                      <span className="text-2xl font-bold tabular-nums">
                        {Math.floor(currentBreakdown.paidElapsed / 3600000).toString().padStart(2, "0")}:
                        {Math.floor((currentBreakdown.paidElapsed % 3600000) / 60000)
                          .toString()
                          .padStart(2, "0")}
                        :
                        {Math.floor((currentBreakdown.paidElapsed % 60000) / 1000)
                          .toString()
                          .padStart(2, "0")}
                      </span>
                    </div>
                    <div className="bg-zinc-900/70 border border-white/10 p-6 rounded text-center">
                      <p className="text-[10px] font-bold text-zinc-500 uppercase mb-4 tracking-widest">
                        Live rate
                      </p>
                      <span
                        className={`text-2xl font-bold ${
                          isNightShift(currentTime) ? "text-yellow-400" : "text-white"
                        }`}
                      >
                        EUR {liveRate.toFixed(2)}
                      </span>
                    </div>
                  </div>

                  <button
                    onClick={endSession}
                    className="flex flex-col items-center gap-4 text-zinc-500 hover:text-red-400 transition-all"
                  >
                    <div className="w-14 h-14 rounded-full border-2 border-zinc-800 flex items-center justify-center transition-all">
                      <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                        <path d="M18.36 6.64a9 9 0 1 1-12.73 0M12 2v10" />
                      </svg>
                    </div>
                    <span className="text-[9px] font-black uppercase tracking-[0.5em]">
                      Termina Turno
                    </span>
                  </button>
                </section>
              )}
            </main>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
